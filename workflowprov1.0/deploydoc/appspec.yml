version: 0.0
os: linux

files:
  - source: deploydoc/
    destination: /home/ubuntu/app
    overwrite: true

permissions:
  - object: /home/ubuntu/app
    owner: ubuntu
    group: ubuntu
    mode: 755

hooks:
  ApplicationStop:
    - location: deploydoc/deploy.sh
      timeout: 120
      runas: ubuntu

  BeforeInstall:
    - location: deploydoc/deploy.sh
      timeout: 120
      runas: ubuntu

  AfterInstall:
    - location: deploydoc/deploy.sh
      timeout: 300
      runas: ubuntu