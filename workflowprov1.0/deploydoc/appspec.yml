version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/app
    overwrite: true

permissions:
  - object: /home/ubuntu/app
    owner: ubuntu
    group: ubuntu
    mode: 755

hooks:
  ApplicationStop:
    - location: deploy.sh
      timeout: 120
      runas: root
      
  AfterInstall:
    - location: deploy.sh
      timeout: 300
      runas: root