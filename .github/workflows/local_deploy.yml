name: Local Build and Deploy to GlassFish

on:
  workflow_dispatch: {}

jobs:
  local-job:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Full Build with All Dependencies
        shell: powershell
        run: |
          cd "workflowprov1.0"
          
          # 1. Structure
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          $null = New-Item -ItemType Directory -Force -Path "build/WEB-INF/classes"
          $null = New-Item -ItemType Directory -Force -Path "build/WEB-INF/lib"
          $null = New-Item -ItemType Directory -Force -Path "build/META-INF"
          $null = New-Item -ItemType Directory -Force -Path "dist"

          # 2. Ressources
          Get-ChildItem -Path . -Include *.jsp, *.php, *.html, *.css, *.xml -Recurse | Copy-Item -Destination "build\" -Force -ErrorAction SilentlyContinue
          $webInfSource = Get-ChildItem -Path . -Filter "WEB-INF" -Recurse | Select-Object -First 1
          if ($webInfSource) { Copy-Item -Path "$($webInfSource.FullName)\*" -Destination "build\WEB-INF\" -Recurse -Force }

          # 3. TÉLÉCHARGEMENT DES LIBRAIRIES MANQUANTES (Jasper, JFreeChart, Gson)
          Write-Host "Téléchargement des dépendances..."
          $deps = @(
              "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.8.9/gson-2.8.9.jar",
              "https://repo1.maven.org/maven2/org/jfree/jfreechart/1.5.3/jfreechart-1.5.3.jar",
              "https://repo1.maven.org/maven2/net/sf/jasperreports/jasperreports/6.17.0/jasperreports-6.17.0.jar",
              "https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/3.1.0/javax.servlet-api-3.1.0.jar",
              "https://repo1.maven.org/maven2/org/eclipse/jdt/ecj/3.26.0/ecj-3.26.0.jar"
          )
          foreach ($url in $deps) { 
              $name = Split-Path $url -Leaf
              Invoke-WebRequest -Uri $url -OutFile "build/WEB-INF/lib/$name" 
          }
          # On garde ecj.jar à la racine pour compiler
          Copy-Item "build/WEB-INF/lib/ecj-3.26.0.jar" "ecj.jar"

          # 4. FIX MANIFEST (Format ASCII pur pour éviter l'erreur 'invalid header')
          [System.IO.File]::WriteAllLines("build/META-INF/MANIFEST.MF", @("Manifest-Version: 1.0", "Jersey-Config-Disable-Scanning: true"))

          # 5. COMPILATION AVEC TOUT LE CLASSPATH
          Write-Host "Compilation en cours..."
          $sourcesFiles = Get-ChildItem -Path src -Filter *.java -Recurse | ForEach-Object { $_.FullName }
          $sourcesFiles | Out-File -FilePath sources.txt -Encoding ascii
          
          # Le CP inclut maintenant toutes les libs téléchargées
          $cp = ".;build/WEB-INF/lib/*"
          java -jar ecj.jar -8 -encoding ISO-8859-1 -d build/WEB-INF/classes -cp $cp "@sources.txt"

          # 6. Création du WAR
          cd build
          jar -cvfm ../dist/workflowmicropop.war META-INF/MANIFEST.MF .

      - name: Deploy to Local GlassFish
        shell: powershell
        run: |
          $env:AS_JAVA = "C:\Program Files\Java\jdk-1.8"
          $asadmin = "C:\Program Files\glassfish-4.1.1\bin\asadmin.bat"
          $warFile = "workflowprov1.0\dist\workflowmicropop.war"
          
          Write-Host "Déploiement final..."
          & $asadmin deploy --force=true --port 30442 --properties "jersey.config.server.provider.bundle.whitelist=none:jersey.config.server.provider.scanning.recursive=false" $warFile