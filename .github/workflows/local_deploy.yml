name: Local Build and Deploy to GlassFish

on:
  workflow_dispatch: {}

jobs:
  local-job:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Surgical Build - Anti-Jersey
        shell: powershell
        run: |
          cd "workflowprov1.0"
          $PROJECT_ROOT = $PWD.Path
          $BUILD_DIR = Join-Path $PROJECT_ROOT "build"
          
          # 1. Nettoyage et Création
          if (Test-Path $BUILD_DIR) { Remove-Item -Recurse -Force $BUILD_DIR }
          New-Item -ItemType Directory -Force -Path (Join-Path $BUILD_DIR "WEB-INF/classes")
          New-Item -ItemType Directory -Force -Path (Join-Path $BUILD_DIR "WEB-INF/lib")
          New-Item -ItemType Directory -Force -Path (Join-Path $BUILD_DIR "META-INF")
          New-Item -ItemType Directory -Force -Path (Join-Path $PROJECT_ROOT "dist")

          # 2. Copie des fichiers
          Get-ChildItem -Path $PROJECT_ROOT -Include *.jsp, *.php, *.html, *.css, *.xml -Recurse | Copy-Item -Destination "$BUILD_DIR\" -Force -ErrorAction SilentlyContinue
          $webInfSource = Get-ChildItem -Path $PROJECT_ROOT -Filter "WEB-INF" -Recurse | Select-Object -First 1
          if ($webInfSource) { Copy-Item -Path "$($webInfSource.FullName)\*" -Destination "$BUILD_DIR\WEB-INF\" -Recurse -Force }

          # 3. CHIRURGIE DU WEB.XML : On arrache Jersey
          $webXmlPath = Join-Path $BUILD_DIR "WEB-INF/web.xml"
          if (Test-Path $webXmlPath) {
              Write-Host "Suppression chirurgicale de Jersey dans le web.xml..."
              $content = Get-Content $webXmlPath -Raw
              # On supprime les blocs <servlet> et <servlet-mapping> qui contiennent 'jersey' ou 'JAX-RS'
              $content = $content -replace '(?s)<servlet>.*?jersey.*?/servlet>', ''
              $content = $content -replace '(?s)<servlet-mapping>.*?jersey.*?/servlet-mapping>', ''
              $content = $content -replace '(?s)<servlet>.*?JAX-RS.*?/servlet>', ''
              $content = $content -replace '(?s)<servlet-mapping>.*?JAX-RS.*?/servlet-mapping>', ''
              [System.IO.File]::WriteAllText($webXmlPath, $content)
          }

          # 4. Téléchargement des dépendances pour la compilation
          $deps = @(
              "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.8.9/gson-2.8.9.jar",
              "https://repo1.maven.org/maven2/org/jfree/jfreechart/1.5.3/jfreechart-1.5.3.jar",
              "https://repo1.maven.org/maven2/net/sf/jasperreports/jasperreports/6.17.0/jasperreports-6.17.0.jar",
              "https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/3.1.0/javax.servlet-api-3.1.0.jar",
              "https://repo1.maven.org/maven2/org/eclipse/jdt/ecj/3.26.0/ecj-3.26.0.jar"
          )
          foreach ($url in $deps) { 
              $name = Split-Path $url -Leaf
              Invoke-WebRequest -Uri $url -OutFile (Join-Path $BUILD_DIR "WEB-INF/lib/$name")
          }

          # 5. Compilation
          $sourcesFiles = Get-ChildItem -Path (Join-Path $PROJECT_ROOT "src") -Filter *.java -Recurse | ForEach-Object { $_.FullName }
          $sourcesFiles | Out-File -FilePath (Join-Path $PROJECT_ROOT "sources.txt") -Encoding ascii
          $cp = ".;$BUILD_DIR/WEB-INF/lib/*"
          java -jar (Join-Path $BUILD_DIR "WEB-INF/lib/ecj-3.26.0.jar") -8 -encoding ISO-8859-1 -d (Join-Path $BUILD_DIR "WEB-INF/classes") -cp $cp "@sources.txt"

          # 6. Création du WAR
          cd $BUILD_DIR
          jar -cvf "../dist/workflowmicropop.war" .

      - name: Deploy to Local GlassFish
        shell: powershell
        run: |
          $env:AS_JAVA = "C:\Program Files\Java\jdk-1.8"
          $asadmin = "C:\Program Files\glassfish-4.1.1\bin\asadmin.bat"
          $warFile = "workflowprov1.0\dist\workflowmicropop.war"
          # On déploie sans les propriétés qui faisaient peut-être bugger asadmin
          & $asadmin deploy --force=true --port 30442 $warFile