name: Local Build and Deploy to GlassFish

on:
  workflow_dispatch: {} # Lancement manuel
  schedule:
    - cron: '30 4 * * 2'  # <--- CHAQUE MARDI A 04h30 UTC

jobs:
  local-job:
    runs-on: self-hosted # Utilise ton Runner local (MON-PC-DEV)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build WAR with Web Resources (Windows)
        shell: powershell
        run: |
          # 1. Accès au dossier du projet
          cd "workflowprov1.0"
          
          # 2. Nettoyage complet
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          $null = New-Item -ItemType Directory -Force -Path "build/WEB-INF/classes"
          $null = New-Item -ItemType Directory -Force -Path "dist"

          # 3. COLLECTE DES RESSOURCES WEB (Crucial pour l'affichage)
          Write-Host "Collecte des fichiers JSP, PHP et configuration..."
          # On copie les fichiers de vue à la racine du build
          Copy-Item -Path "*.jsp", "*.php" -Destination "build\" -ErrorAction SilentlyContinue
          
          # On copie le dossier WEB-INF (contenant web.xml) s'il existe
          if (Test-Path "WEB-INF") {
              Copy-Item -Path "WEB-INF\*" -Destination "build\WEB-INF\" -Recurse -Force
          }

          # 4. Téléchargement des outils de compilation
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/eclipse/jdt/ecj/3.26.0/ecj-3.26.0.jar" -OutFile "ecj.jar"
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/3.1.0/javax.servlet-api-3.1.0.jar" -OutFile "servlet-api.jar"

          # 5. Correction de l'encodage du code source (Ã© -> e)
          Get-ChildItem -Path src -Filter *.java -Recurse | ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              $content = $content -replace 'Ã©', 'e'
              $content = $content -replace 'é', 'e'
              [System.IO.File]::WriteAllText($_.FullName, $content, (New-Object System.Text.UTF8Encoding($false)))
          }

          # 6. Compilation des Servlets
          Write-Host "Compilation des classes..."
          $sourcesFiles = Get-ChildItem -Path src -Filter *.java -Recurse | ForEach-Object { $_.FullName }
          $sourcesFiles | Out-File -FilePath sources.txt -Encoding ascii
          
          # Utilisation de "@sources.txt" avec guillemets pour PowerShell
          java -jar ecj.jar -8 -encoding ISO-8859-1 -d build/WEB-INF/classes -cp ".;servlet-api.jar" "@sources.txt"

          # 7. Création du WAR final
          Write-Host "Création du package WAR..."
          cd build
          jar -cvf ../dist/workflowmicropop.war .

      - name: Deploy to Local GlassFish
        shell: powershell
        run: |
          # --- CONFIGURATION ENVIRONNEMENT ---
          # On force l'utilisation du JDK 1.8 pour éviter l'erreur "version 0"
          $env:AS_JAVA = "C:\Program Files\Java\jdk-1.8"
          
          # Chemins basés sur tes captures d'écran
          $asadmin = "C:\Program Files\glassfish-4.1.1\bin\asadmin.bat"
          $warFile = "workflowprov1.0\dist\workflowmicropop.war"
          $port = "30442"
          
          Write-Host "Déploiement sur GlassFish (Port $port)..."
          # Opérateur & pour gérer les espaces dans le chemin
          & $asadmin deploy --force=true --port $port $warFile