name: Local Build and Deploy to GlassFish

on:
  workflow_dispatch: {}

jobs:
  local-job:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Smart Eclipse Build
        shell: powershell
        run: |
          cd "workflowprov1.0"
          $PROJECT_ROOT = $PWD.Path
          $BUILD_DIR = Join-Path $PROJECT_ROOT "build"
          
          # 1. Nettoyage et préparation
          if (Test-Path $BUILD_DIR) { Remove-Item -Recurse -Force $BUILD_DIR }
          New-Item -ItemType Directory -Force -Path (Join-Path $BUILD_DIR "WEB-INF/classes")
          New-Item -ItemType Directory -Force -Path (Join-Path $BUILD_DIR "WEB-INF/lib")

          # 2. Copie Web source
          $webRoot = Get-ChildItem -Path $PROJECT_ROOT -Directory -Recurse | Where-Object { Test-Path (Join-Path $_.FullName "WEB-INF") } | Select-Object -First 1
          Copy-Item -Path "$($webRoot.FullName)\*" -Destination "$BUILD_DIR\" -Recurse -Force

          # 3. Dépendances (indispensables)
          $libPath = Join-Path $BUILD_DIR "WEB-INF/lib"
          $essentialDeps = @{
              "javaee-api-7.0.jar" = "https://repo1.maven.org/maven2/javax/javaee-api/7.0/javaee-api-7.0.jar"
              "gson-2.8.9.jar" = "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.8.9/gson-2.8.9.jar"
              "jfreechart-1.5.3.jar" = "https://repo1.maven.org/maven2/org/jfree/jfreechart/1.5.3/jfreechart-1.5.3.jar"
              "jasperreports-6.17.0.jar" = "https://repo1.maven.org/maven2/net/sf/jasperreports/jasperreports/6.17.0/jasperreports-6.17.0.jar"
              "jersey-servlet-1.19.4.jar" = "https://repo1.maven.org/maven2/com/sun/jersey/jersey-servlet/1.19.4/jersey-servlet-1.19.4.jar"
              "ecj-3.26.0.jar" = "https://repo1.maven.org/maven2/org/eclipse/jdt/ecj/3.26.0/ecj-3.26.0.jar"
          }

          foreach ($jarName in $essentialDeps.Keys) {
              $target = Join-Path $libPath $jarName
              if (-not (Test-Path $target)) {
                  Invoke-WebRequest -Uri $essentialDeps[$jarName] -OutFile $target
              }
          }

          # 4. Classpath (Construction propre)
          $jars = Get-ChildItem -Path $libPath -Filter *.jar
          $cp = ($jars.FullName -join ";")

          # 5. Compilation : On utilise l'encodage par défaut de Windows (Default) 
          # pour correspondre à l'encodage de tes fichiers sources créés sous Windows/Eclipse.
          $sourcesFiles = Get-ChildItem -Path (Join-Path $PROJECT_ROOT "src") -Filter *.java -Recurse | ForEach-Object { $_.FullName }
          
          # Utilisation de -Encoding Default pour éviter le problème "File missing" (BOM UTF8)
          $sourcesFiles | Out-File -FilePath (Join-Path $PROJECT_ROOT "sources.txt") -Encoding Default
          
          $ecjJar = Join-Path $libPath "ecj-3.26.0.jar"
          $outDir = Join-Path $BUILD_DIR "WEB-INF/classes"

          # Utilisation de l'argument -warn:none pour ignorer les centaines d'avertissements et voir les erreurs réelles
          java -jar $ecjJar -8 -encoding Default -warn:none -d $outDir -cp "$cp" "@sources.txt"

          # 6. Création du WAR
          if ($LASTEXITCODE -eq 0) {
              Write-Host "Compilation réussie."
              cd $BUILD_DIR
              jar -cvf "../dist/workflowmicropop.war" .
          } else {
              Write-Error "Échec de compilation."
              exit 1
          }

      - name: Deploy to Local GlassFish
        shell: powershell
        run: |
          $asadmin = "C:\Program Files\glassfish-4.1.1\bin\asadmin.bat"
          $warFile = "workflowprov1.0\dist\workflowmicropop.war"
          if (Test-Path $warFile) {
              & $asadmin deploy --force=true --port 30442 $warFile
          }