name: Local Build and Deploy to GlassFish

on:
  workflow_dispatch: {}

jobs:
  local-job:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Smart Eclipse Build
        shell: powershell
        run: |
          cd "workflowprov1.0"
          $PROJECT_ROOT = $PWD.Path
          $BUILD_DIR = Join-Path $PROJECT_ROOT "build"
          $TEMP_SRC = Join-Path $PROJECT_ROOT "src_compiled"
          $DIST_DIR = Join-Path $PROJECT_ROOT "dist"
          
          # 1. Nettoyage
          if (Test-Path $BUILD_DIR) { Remove-Item -Recurse -Force $BUILD_DIR }
          if (Test-Path $TEMP_SRC) { Remove-Item -Recurse -Force $TEMP_SRC }
          if (-not (Test-Path $DIST_DIR)) { New-Item -ItemType Directory -Path $DIST_DIR }
          
          New-Item -ItemType Directory -Force -Path (Join-Path $BUILD_DIR "WEB-INF/classes")
          New-Item -ItemType Directory -Force -Path (Join-Path $BUILD_DIR "WEB-INF/lib")

          # 2. Copie du CONTENU de WebContent (C'est ici que ça se joue)
          $webContentPath = Join-Path $PROJECT_ROOT "WebContent"
          Write-Host "Copie du contenu de $webContentPath vers la racine du build..."
          # On utilise \* pour copier les fichiers/dossiers à l'intérieur, pas le dossier lui-même
          Copy-Item -Path "$webContentPath\*" -Destination "$BUILD_DIR\" -Recurse -Force

          # 3. Shadow Copy pour les accents (Copie de travail)
          Copy-Item -Path (Join-Path $PROJECT_ROOT "src") -Destination $TEMP_SRC -Recurse
          Get-ChildItem -Path $TEMP_SRC -Filter *.java -Recurse | ForEach-Object {
              (Get-Content $_.FullName) -replace 'é', 'e' | Set-Content $_.FullName
          }

          # 4. Dépendances de compilation (On exclut Jersey et JavaEE du WAR final)
          $libPath = Join-Path $BUILD_DIR "WEB-INF/lib"
          $essentialDeps = @{
              "javaee-api-7.0.jar" = "https://repo1.maven.org/maven2/javax/javaee-api/7.0/javaee-api-7.0.jar"
              "gson-2.8.9.jar" = "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.8.9/gson-2.8.9.jar"
              "jfreechart-1.5.3.jar" = "https://repo1.maven.org/maven2/org/jfree/jfreechart/1.5.3/jfreechart-1.5.3.jar"
              "jasperreports-6.17.0.jar" = "https://repo1.maven.org/maven2/net/sf/jasperreports/jasperreports/6.17.0/jasperreports-6.17.0.jar"
              "ecj-3.26.0.jar" = "https://repo1.maven.org/maven2/org/eclipse/jdt/ecj/3.26.0/ecj-3.26.0.jar"
          }
          foreach ($jarName in $essentialDeps.Keys) {
              Invoke-WebRequest -Uri $essentialDeps[$jarName] -OutFile (Join-Path $libPath $jarName)
          }

          # 5. Compilation
          $jars = Get-ChildItem -Path $libPath -Filter *.jar
          $cp = ($jars.FullName -join ";")
          $sourcesFiles = Get-ChildItem -Path $TEMP_SRC -Filter *.java -Recurse | ForEach-Object { $_.FullName }
          [System.IO.File]::WriteAllLines((Join-Path $PROJECT_ROOT "sources.txt"), $sourcesFiles)
          
          java -jar (Join-Path $libPath "ecj-3.26.0.jar") -8 -encoding UTF-8 -warn:none -d (Join-Path $BUILD_DIR "WEB-INF/classes") -cp "$cp" "@sources.txt"

          # 6. Création du WAR
          if ($LASTEXITCODE -eq 0) {
              $warPath = Join-Path $DIST_DIR "workflowmicropop.war"
              
              # Nettoyage avant empaquetage : on enlève les libs fournies par GlassFish
              Remove-Item (Join-Path $libPath "javaee-api-7.0.jar") -Force
              Remove-Item (Join-Path $libPath "ecj-3.26.0.jar") -Force
              
              cd $BUILD_DIR
              jar -cvf $warPath .
              Write-Host "WAR généré avec succès dans $warPath"
          } else {
              exit 1
          }

      - name: Deploy to Local GlassFish
        shell: powershell
        run: |
          $env:AS_JAVA = "C:\Program Files\Java\jdk-1.8"
          $asadmin = "C:\Program Files\glassfish-4.1.1\bin\asadmin.bat"
          $warFile = "workflowprov1.0\dist\workflowmicropop.war"
          if (Test-Path $warFile) {
              # On force le context root pour être sûr
              & $asadmin deploy --force=true --contextroot "workflowmicropop" --port 30442 $warFile
          }