name: Local Build and Deploy to GlassFish

on:
  workflow_dispatch: {}

jobs:
  local-job:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ÉTAPE 1 : CONSTRUCTION DU WAR AVEC LA BONNE STRUCTURE
      - name: Build WAR with correct structure
        shell: powershell
        run: |
          cd "workflowprov1.0"
          
          # Nettoyage
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          $null = New-Item -ItemType Directory -Force -Path "build/WEB-INF/classes"
          $null = New-Item -ItemType Directory -Force -Path "dist"

          # 1. COPIE DES FICHIERS WEB (PHP, JSP, HTML, CSS, WEB-INF/*.xml)
          # On copie tout le contenu du projet (sauf le code source java) dans build
          Write-Host "Préparation des fichiers web..."
          Copy-Item -Path "WebContent\*" -Destination "build\" -Recurse -ErrorAction SilentlyContinue
          # Si tes fichiers PHP/JSP sont à la racine du projet et non dans WebContent :
          # Copy-Item -Path "*.php", "*.jsp", "*.html", "WEB-INF\web.xml" -Destination "build\" -ErrorAction SilentlyContinue

          # 2. Téléchargement des outils
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/eclipse/jdt/ecj/3.26.0/ecj-3.26.0.jar" -OutFile "ecj.jar"
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/3.1.0/javax.servlet-api-3.1.0.jar" -OutFile "servlet-api.jar"

          # 3. Correction de l'encodage
          Get-ChildItem -Path src -Filter *.java -Recurse | ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              $content = $content -replace 'Ã©', 'e'
              $content = $content -replace 'é', 'e'
              [System.IO.File]::WriteAllText($_.FullName, $content, (New-Object System.Text.UTF8Encoding($false)))
          }

          # 4. Compilation des classes Java vers WEB-INF/classes
          Write-Host "Compilation des Servlets..."
          $sourcesFiles = Get-ChildItem -Path src -Filter *.java -Recurse | ForEach-Object { $_.FullName }
          $sourcesFiles | Out-File -FilePath sources.txt -Encoding ascii
          java -jar ecj.jar -8 -encoding ISO-8859-1 -d build/WEB-INF/classes -cp ".;servlet-api.jar" "@sources.txt"

          # 5. Création du WAR (on zippe le contenu de build)
          Write-Host "Création du package final..."
          cd build
          jar -cvf ../dist/workflowmicropop.war .

      # ÉTAPE 2 : DÉPLOIEMENT
      - name: Deploy to Local GlassFish
        shell: powershell
        run: |
          $env:AS_JAVA = "C:\Program Files\Java\jdk-1.8"
          $asadmin = "C:\Program Files\glassfish-4.1.1\bin\asadmin.bat"
          $warFile = "workflowprov1.0\dist\workflowmicropop.war"
          
          Write-Host "Déploiement sur GlassFish..."
          & $asadmin deploy --force=true --port 30442 $warFile