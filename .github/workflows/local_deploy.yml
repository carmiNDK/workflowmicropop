name: Local Build and Deploy to GlassFish

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 4 * * 2'

jobs:
  local-job:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build WAR with Forced Jersey Injector
        shell: powershell
        run: |
          cd "workflowprov1.0"
          
          # 1. Préparation de la structure
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          $null = New-Item -ItemType Directory -Force -Path "build/WEB-INF/classes"
          $null = New-Item -ItemType Directory -Force -Path "build/WEB-INF/lib"
          $null = New-Item -ItemType Directory -Force -Path "dist"

          # 2. COLLECTE DES RESSOURCES WEB
          Write-Host "Collecte des fichiers JSP et PHP..."
          Get-ChildItem -Path . -Include *.jsp, *.php, *.html, *.css -Recurse | Copy-Item -Destination "build\" -Force -ErrorAction SilentlyContinue
          
          $webInfSource = Get-ChildItem -Path . -Filter "WEB-INF" -Recurse | Select-Object -First 1
          if ($webInfSource) {
              Copy-Item -Path "$($webInfSource.FullName)\*" -Destination "build\WEB-INF\" -Recurse -Force
          }

          # 3. TÉLÉCHARGEMENT DE JERSEY (Pour combler le manque de GlassFish)
          Write-Host "Injection des bibliothèques Jersey manquantes..."
          $jerseyUrl = "https://repo1.maven.org/maven2/com/sun/jersey/jersey-servlet/1.19.4/jersey-servlet-1.19.4.jar"
          $jerseyCoreUrl = "https://repo1.maven.org/maven2/com/sun/jersey/jersey-core/1.19.4/jersey-core-1.19.4.jar"
          $jerseyServerUrl = "https://repo1.maven.org/maven2/com/sun/jersey/jersey-server/1.19.4/jersey-server-1.19.4.jar"
          
          Invoke-WebRequest -Uri $jerseyUrl -OutFile "build/WEB-INF/lib/jersey-servlet.jar"
          Invoke-WebRequest -Uri $jerseyCoreUrl -OutFile "build/WEB-INF/lib/jersey-core.jar"
          Invoke-WebRequest -Uri $jerseyServerUrl -OutFile "build/WEB-INF/lib/jersey-server.jar"

          # 4. COMPILATION
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/eclipse/jdt/ecj/3.26.0/ecj-3.26.0.jar" -OutFile "ecj.jar"
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/3.1.0/javax.servlet-api-3.1.0.jar" -OutFile "servlet-api.jar"

          Write-Host "Compilation des classes..."
          $sourcesFiles = Get-ChildItem -Path src -Filter *.java -Recurse | ForEach-Object { $_.FullName }
          $sourcesFiles | Out-File -FilePath sources.txt -Encoding ascii
          
          # Ajout des nouveaux jars Jersey au classpath pour la compilation si nécessaire
          $cp = ".;servlet-api.jar;build/WEB-INF/lib/jersey-servlet.jar;build/WEB-INF/lib/jersey-core.jar;build/WEB-INF/lib/jersey-server.jar"
          java -jar ecj.jar -8 -encoding ISO-8859-1 -d build/WEB-INF/classes -cp $cp "@sources.txt"

          # 5. Création du WAR
          cd build
          jar -cvf ../dist/workflowmicropop.war .

      - name: Deploy to Local GlassFish
        shell: powershell
        run: |
          $env:AS_JAVA = "C:\Program Files\Java\jdk-1.8"
          $asadmin = "C:\Program Files\glassfish-4.1.1\bin\asadmin.bat"
          $warFile = "workflowprov1.0\dist\workflowmicropop.war"
          
          Write-Host "Déploiement avec Jersey Injecté..."
          & $asadmin deploy --force=true --port 30442 $warFile