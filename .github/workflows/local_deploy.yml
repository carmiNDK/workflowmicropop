name: Local Build and Deploy to GlassFish

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 6 * * 2' 

jobs:
  local-job:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build WAR with Jersey Bypasser
        shell: powershell
        run: |
          cd "workflowprov1.0"
          
          # 1. Structure
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          $null = New-Item -ItemType Directory -Force -Path "build/WEB-INF/classes"
          $null = New-Item -ItemType Directory -Force -Path "build/WEB-INF/lib"
          $null = New-Item -ItemType Directory -Force -Path "dist"

          # 2. Ressources Web
          Get-ChildItem -Path . -Include *.jsp, *.php, *.html, *.css -Recurse | Copy-Item -Destination "build\" -Force -ErrorAction SilentlyContinue
          $webInfSource = Get-ChildItem -Path . -Filter "WEB-INF" -Recurse | Select-Object -First 1
          if ($webInfSource) { Copy-Item -Path "$($webInfSource.FullName)\*" -Destination "build\WEB-INF\" -Recurse -Force }

          # 3. LE COUP DE MAÎTRE : Désactiver Jersey au niveau du déploiement
          # On crée un fichier glassfish-web.xml s'il n'existe pas pour forcer le délégué
          $glassfishWeb = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE glassfish-web-app PUBLIC "-//GlassFish.org//DTD GlassFish Application Server 3.1 Servlet 3.0//EN" "http://glassfish.org/dtds/glassfish-web-app_3_0-1.dtd">
          <glassfish-web-app>
            <context-root>/workflowmicropop</context-root>
            <property name="jersey.config.server.provider.bundle.whitelist" value="none" />
            <property name="jersey.config.server.provider.scanning.recursive" value="false" />
          </glassfish-web-app>
          "@
          $glassfishWeb | Out-File -FilePath "build/WEB-INF/glassfish-web.xml" -Encoding utf8

          # 4. Compilation standard
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/eclipse/jdt/ecj/3.26.0/ecj-3.26.0.jar" -OutFile "ecj.jar"
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/3.1.0/javax.servlet-api-3.1.0.jar" -OutFile "servlet-api.jar"
          
          # Correction encodage source
          Get-ChildItem -Path src -Filter *.java -Recurse | ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              $content = $content -replace 'Ã©', 'e'
              $content = $content -replace 'é', 'e'
              [System.IO.File]::WriteAllText($_.FullName, $content, (New-Object System.Text.UTF8Encoding($false)))
          }

          $sourcesFiles = Get-ChildItem -Path src -Filter *.java -Recurse | ForEach-Object { $_.FullName }
          $sourcesFiles | Out-File -FilePath sources.txt -Encoding ascii
          java -jar ecj.jar -8 -encoding ISO-8859-1 -d build/WEB-INF/classes -cp ".;servlet-api.jar" "@sources.txt"

          # 5. Création du WAR
          cd build
          jar -cvf ../dist/workflowmicropop.war .

      - name: Deploy to Local GlassFish
        shell: powershell
        run: |
          $env:AS_JAVA = "C:\Program Files\Java\jdk-1.8"
          $asadmin = "C:\Program Files\glassfish-4.1.1\bin\asadmin.bat"
          $warFile = "workflowprov1.0\dist\workflowmicropop.war"
          
          Write-Host "Déploiement avec Jersey désactivé de force..."
          & $asadmin deploy --force=true --port 30442 $warFile