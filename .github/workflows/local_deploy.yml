name: Local Build and Deploy to GlassFish

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 6 * * 2' 

jobs:
  local-job:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build WAR with Jersey Hard-Fix
        shell: powershell
        run: |
          cd "workflowprov1.0"
          
          # 1. Structure propre
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          $null = New-Item -ItemType Directory -Force -Path "build/WEB-INF/classes/com/fix"
          $null = New-Item -ItemType Directory -Force -Path "build/WEB-INF/lib"
          $null = New-Item -ItemType Directory -Force -Path "dist"

          # 2. Ressources Web
          Get-ChildItem -Path . -Include *.jsp, *.php, *.html, *.css -Recurse | Copy-Item -Destination "build\" -Force -ErrorAction SilentlyContinue
          $webInfSource = Get-ChildItem -Path . -Filter "WEB-INF" -Recurse | Select-Object -First 1
          if ($webInfSource) { Copy-Item -Path "$($webInfSource.FullName)\*" -Destination "build\WEB-INF\" -Recurse -Force }

          # 3. CRÉATION DE LA CLASSE DE SECOURS (Package précis)
          $ghostClass = @"
          package com.fix;
          import javax.ws.rs.Path;
          import javax.ws.rs.GET;
          import javax.ws.rs.Produces;
          @Path("/fix")
          public class GlassfishFix {
              @GET
              @Produces("text/plain")
              public String check() { return "Jersey is Fixed"; }
          }
          "@
          $ghostClass | Out-File -FilePath "src/GlassfishFix.java" -Encoding utf8

          # 4. INJECTION DYNAMIQUE DANS LE WEB.XML DU BUILD
          # On force Jersey à scanner le package 'com.fix' pour qu'il trouve au moins une classe
          if (Test-Path "build/WEB-INF/web.xml") {
              Write-Host "Injection du package de secours dans le web.xml temporaire..."
              $xmlPath = "build/WEB-INF/web.xml"
              $content = Get-Content $xmlPath -Raw
              if ($content -match "com.sun.jersey.config.property.packages") {
                  # On ajoute notre package à la liste existante
                  $content = $content -replace '(<param-value>)([^<]*)', '$1com.fix;$2'
                  Set-Content -Path $xmlPath -Value $content
              }
          }

          # 5. Téléchargement des dépendances
          $libs = @(
              "https://repo1.maven.org/maven2/com/sun/jersey/jersey-servlet/1.19.4/jersey-servlet-1.19.4.jar",
              "https://repo1.maven.org/maven2/com/sun/jersey/jersey-core/1.19.4/jersey-core-1.19.4.jar",
              "https://repo1.maven.org/maven2/com/sun/jersey/jersey-server/1.19.4/jersey-server-1.19.4.jar",
              "https://repo1.maven.org/maven2/javax/ws/rs/javax.ws.rs-api/2.0.1/javax.ws.rs-api-2.0.1.jar"
          )
          foreach ($url in $libs) { $name = Split-Path $url -Leaf; Invoke-WebRequest -Uri $url -OutFile "build/WEB-INF/lib/$name" }

          # 6. Compilation
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/eclipse/jdt/ecj/3.26.0/ecj-3.26.0.jar" -OutFile "ecj.jar"
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/3.1.0/javax.servlet-api-3.1.0.jar" -OutFile "servlet-api.jar"
          $sourcesFiles = Get-ChildItem -Path src -Filter *.java -Recurse | ForEach-Object { $_.FullName }
          $sourcesFiles | Out-File -FilePath sources.txt -Encoding ascii
          java -jar ecj.jar -8 -encoding ISO-8859-1 -d build/WEB-INF/classes -cp ".;servlet-api.jar;build/WEB-INF/lib/*" "@sources.txt"

          # 7. Création du WAR
          cd build
          jar -cvf ../dist/workflowmicropop.war .

      - name: Deploy to Local GlassFish
        shell: powershell
        run: |
          $env:AS_JAVA = "C:\Program Files\Java\jdk-1.8"
          $asadmin = "C:\Program Files\glassfish-4.1.1\bin\asadmin.bat"
          $warFile = "workflowprov1.0\dist\workflowmicropop.war"
          Write-Host "Tentative de déploiement final..."
          & $asadmin deploy --force=true --port 30442 $warFile