name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Deployment Package
        run: |
          # 1. Localisation des fichiers source
          DEPLOY_SH=$(find . -name "deploy.sh" | head -n 1)
          WAR_FILE=$(find . -name "workflowmicropop.war" | head -n 1)
          APPSPEC=$(find . -name "appspec.yml" | head -n 1)

          # 2. NETTOYAGE ULTIME (Supprime toute trace de Windows CRLF)
          cat "$DEPLOY_SH" | tr -d '\r' > ./deploy.sh
          cat "$APPSPEC" | tr -d '\r' > ./appspec.yml
          
          # 3. Copie du WAR à la racine
          cp "$WAR_FILE" ./workflowmicropop.war
          
          # 4. Droits d'exécution forcés
          chmod +x ./deploy.sh
          
          # 5. Debug visuel dans GitHub Actions
          ls -la

      - name: Create package
        run: |
          # On zip uniquement les fichiers nettoyés à la racine
          zip deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE