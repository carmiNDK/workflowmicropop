Gemini a dit
Si le dossier /app est toujours vide après avoir utilisé le script "Dernière Chance", nous avons maintenant une certitude mathématique : le script ne s'exécute même pas.

Le problème ne vient plus de votre code Bash, mais de la communication entre AWS et votre instance au moment du boot.

Voici les 3 causes critiques restantes et comment les régler une par une :

1. Le conflit du "Premier Boot" (L'AMI est "sale")
Si vous avez créé votre AMI à partir d'une instance où vous aviez déjà fait des tests, cloud-init (le service qui lit le User Data) pense qu'il a déjà fini son travail.

La solution radicale :

Connectez-vous à l'instance qui vous sert de modèle (celle dont vous tirez l'AMI).

Tapez exactement ceci :

Bash
sudo rm -rf /var/lib/cloud/instances/*
sudo cloud-init clean --logs
Éteignez l'instance immédiatement et recréez votre AMI. Cela force cloud-init à se comporter comme s'il arrivait sur une terre inconnue au prochain démarrage.

2. Le format du User Data (Le "Shebang")
AWS est extrêmement pointilleux sur la première ligne. S'il y a un seul espace ou un caractère invisible avant #!/bin/bash, le script est ignoré.

Vérification :

Assurez-vous que votre script commence exactement à la ligne 1, colonne 1 par #!/bin/bash.

Dans la console AWS, vérifiez que vous n'avez pas accidentellement coché "Base64 encoded" si vous collez du texte brut, ou inversement. Collez-le simplement en texte brut sans rien cocher.

3. Les logs de vérité (Le diagnostic final)
Puisque le dossier /app est vide, nous devons savoir si l'instance a seulement essayé de lire le script. Connectez-vous en SSH à une instance lancée par votre ASG et tapez :

Bash
ls -l /var/log/cloud-init-output.log
Cas A : "No such file or directory" -> cloud-init n'est pas installé ou est désactivé sur votre AMI. L'instance ignore totalement votre User Data.

Cas B : Le fichier existe mais est vide -> Le script a été reçu mais a planté avant d'écrire la moindre ligne (souvent un problème de permissions sur l'AMI).

Cas C : Le fichier contient "Permission denied" ou "Command not found" -> Le script s'exécute mais votre AMI est configurée de façon tellement restrictive que root ne peut pas écrire dans /home/ubuntu.

Le "Test du Miroir" (Pour savoir si c'est l'AMI ou le Script)
Pour éliminer le doute sur votre script Payara, lancez une instance avec ce User Data ultra-simplifié :

