          chmod +x ./deploy.sh

      - name: Create package
        run: |
          # On zip les fichiers qui sont maintenant à la racine
          zip deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE
Pourquoi c'est important ?
L'erreur "Exit code 1" dans l'étape Prepare Deployment Package arrive parce qu'une commande cp échoue. En utilisant find . -name, on s'assure que même si tes fichiers sont dans workflowprov1.0/deploydoc/ ou ailleurs, GitHub les trouvera et les mettra au bon endroit pour le ZIP.

