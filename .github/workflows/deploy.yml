Service Payara arrêté : Si Payara n'est pas démarré, le script va attendre et échouer (timeout).

Action : Tape sudo systemctl status payara ou vérifie que Payara tourne.

Appspec et Deploy.sh : Assure-toi que dans ton appspec.yml, tu as bien mis runas: root.

