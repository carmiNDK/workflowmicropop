name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Deployment Package
        run: |
          # 1. On crée un dossier de sortie propre (quarantaine)
          mkdir -p ./out_package

          # 2. Localisation des fichiers originaux
          DEPLOY_SH_SRC=$(find . -name "deploy.sh" | head -n 1)
          WAR_FILE_SRC=$(find . -name "workflowmicropop.war" | head -n 1)
          APPSPEC_SRC=$(find . -name "appspec.yml" | head -n 1)

          # 3. NETTOYAGE ET COPIE VERS LE DOSSIER DE SORTIE
          # On force le format Linux et l'UTF-8 pur vers le dossier ./out_package
          cat "$DEPLOY_SH_SRC" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/deploy.sh
          cat "$APPSPEC_SRC" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/appspec.yml
          cp "$WAR_FILE_SRC" ./out_package/workflowmicropop.war

          # 4. On donne les droits d'exécution sur le fichier nettoyé
          chmod +x ./out_package/deploy.sh
          
          # 5. On vérifie que le dossier contient bien les 3 fichiers
          ls -la ./out_package

      - name: Create package
        run: |
          # On entre dans le dossier out_package pour zipper UNIQUEMENT son contenu
          # Cela garantit qu'il n'y a pas de vieux fichiers ou de dossiers inutiles
          cd ./out_package && zip ../deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE