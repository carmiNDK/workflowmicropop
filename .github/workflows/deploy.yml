On va rendre ton script "intelligent" : il fera l' Undeploy s'il est appelé pendant ApplicationStop et le Deploy s'il est appelé pendant AfterInstall.

Modifier deploydoc/deploy.sh :

Bash
#!/bin/bash
# Redirection des logs pour débugger dans la console CodeDeploy
exec > >(tee -a /home/ubuntu/deploy_script.log) 2>&1

ASADMIN="/opt/payara/bin/asadmin"
PWD_FILE="/tmp/.asadmin_pass"
echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE

# Détecter l'étape de CodeDeploy via la variable d'environnement AWS
if [ "$LIFECYCLE_EVENT" == "ApplicationStop" ]; then
    echo "Étape : ApplicationStop - Nettoyage de l'ancienne version"
    $ASADMIN --user admin --passwordfile $PWD_FILE list-applications | grep workflowmicropop
    if [ $? -eq 0 ]; then
        $ASADMIN --user admin --passwordfile $PWD_FILE undeploy workflowmicropop
    fi

elif [ "$LIFECYCLE_EVENT" == "AfterInstall" ]; then
    echo "Étape : AfterInstall - Déploiement de la nouvelle version"
    # On attend que Payara soit bien réveillé
    while ! nc -z localhost 4848; do sleep 5; done
    
    $ASADMIN --user admin --passwordfile $PWD_FILE deploy --force --contextroot /workflowmicropop /home/ubuntu/app/workflowmicropop.war
fi

rm -f $PWD_FILE
