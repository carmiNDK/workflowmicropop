name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Force la récupération de tout l'historique pour éviter le cache

      - name: Prepare Deployment Package
        run: |
          # 1. Nettoyage total avant de commencer
          rm -rf ./out_package deploydoc.zip
          mkdir -p ./out_package

          # 2. LOCALISATION INTELLIGENTE
          # On cherche le WAR le plus RECENT dans tout le projet
          WAR_FILE_SRC=$(find . -name "workflowmicropop.war" -type f -printf '%T@ %p\n' | sort -n | tail -1 | cut -f2- -d" ")
          DEPLOY_SH_SRC=$(find . -name "deploy.sh" -type f | head -n 1)
          APPSPEC_SRC=$(find . -name "appspec.yml" -type f | head -n 1)

          echo "DEBUG: Fichier WAR detecté : $WAR_FILE_SRC"

          # 3. TRANSFERT ET NETTOYAGE
          # On utilise 'cp -p' pour préserver les attributs et on nettoie l'encodage
          cat "$DEPLOY_SH_SRC" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/deploy.sh
          cat "$APPSPEC_SRC" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/appspec.yml
          
          # IMPORTANT: On copie le WAR détecté
          cp "$WAR_FILE_SRC" ./out_package/workflowmicropop.war

          chmod +x ./out_package/deploy.sh
          
          # 4. VERIFICATION DE LA TAILLE (Pour être sûr que c'est le bon)
          echo "Taille du WAR a deployer :"
          ls -lh ./out_package/workflowmicropop.war

      - name: Create package
        run: |
          # Création du ZIP à partir du dossier propre
          cd ./out_package && zip ../deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          # On ecrase systematiquement sur S3
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE