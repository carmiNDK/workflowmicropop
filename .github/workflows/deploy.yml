Puisque votre DG attend, on va utiliser la méthode "Force Brute". Ce script est conçu pour contourner tous les obstacles : il utilise des chemins absolus, vérifie chaque étape, et surtout, il télécharge le fichier avant même de parler à Payara.

Voici le code à copier dans votre Launch Template :

Bash
#!/bin/bash

# 1. Redirection totale pour le debug (Indispensable)
exec > >(tee /home/ubuntu/deploy.log | logger -t user-data -s 2>/dev/console) 2>&1

echo "--- DEBUT DU DEPLOIEMENT FORCE ---"

# --- Configuration ---
REGION="eu-west-3"
S3_BUCKET="micropopdev"
S3_KEY="bundle.zip"
APP_DIR="/home/ubuntu/app"
WAR_FILE="workflowmicropop.war"
ASADMIN="/opt/payara/bin/asadmin"
PWD_FILE="/tmp/.asadmin_pass"

# 2. Preparation du terrain
mkdir -p $APP_DIR
echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE
chmod 600 $PWD_FILE

# 3. Installation des outils (On s'assure qu'ils sont là)
apt-get update -y
apt-get install -y unzip awscli

# 4. TELECHARGEMENT S3 (Le point critique)
echo "Tentative de récupération du WAR sur S3..."
# On vide le dossier au cas où
rm -f $APP_DIR/bundle.zip

# On tente le téléchargement
aws s3 cp s3://$S3_BUCKET/$S3_KEY $APP_DIR/bundle.zip --region $REGION

if [ ! -f "$APP_DIR/bundle.zip" ]; then
    echo "ERREUR : S3 n'a pas livré le fichier. Vérifiez le rôle IAM !"
    exit 1
fi

# 5. EXTRACTION
echo "Extraction du bundle..."
unzip -o $APP_DIR/bundle.zip -d $APP_DIR
chown -R ubuntu:ubuntu $APP_DIR
ls -l $APP_DIR # Pour voir si le .war est bien là dans le log

# 6. ATTENTE ET DEPLOIEMENT PAYARA
echo "Attente de Payara..."
# On attend que le port admin 4848 soit ouvert avant de lancer les commandes
for i in {1..30}; do
    if netstat -tuln | grep -q ":4848"; then
        echo "Port 4848 détecté. Payara est prêt."
        break
    fi
    echo "Attente de Payara ($i/30)..."
    sleep 10
done

# 7. ACTIONS DE DEPLOIEMENT
echo "Exécution des commandes asadmin..."

# On force l'admin sécurisée (pour l'accès externe 4848)
$ASADMIN --user admin --passwordfile $PWD_FILE enable-secure-admin

# Déploiement du WAR
if [ -f "$APP_DIR/$WAR_FILE" ]; then
    echo "Déploiement de $WAR_FILE en cours..."
    $ASADMIN --user admin --passwordfile $PWD_FILE deploy --force --contextroot /workflowmicropop $APP_DIR/$WAR_FILE
    echo "Déploiement REUSSI."
else
    echo "ERREUR : Fichier $WAR_FILE introuvable dans $APP_DIR"
fi

# Redémarrage pour valider le tout
$ASADMIN --user admin --passwordfile $PWD_FILE restart-domain

# Nettoyage
rm $PWD_FILE
echo "--- FIN DU SCRIPT ---"
Pourquoi ce code va débloquer votre situation :
Le test du Port 4848 : Au lieu de chercher si le processus "java" tourne, on attend que le port d'administration de Payara soit réellement ouvert. C'est beaucoup plus fiable.

Chemin Absolu /opt/payara/bin/asadmin : On n'utilise plus de variable floue, on tape directement là où Payara est installé.

Logs en temps réel : Si ça échoue, faites immédiatement cat /home/ubuntu/deploy.log. Si vous voyez "Access Denied" à la ligne 25, c'est que votre IAM Role n'a pas les droits S3.

