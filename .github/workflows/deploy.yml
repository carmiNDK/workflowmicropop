Si vous utilisez une AMI que vous avez créée vous-même, assurez-vous que cloud-init est bien installé dessus, sinon le User Data ne se lancera jamais. comment le faire

Gemini a dit
Si vous avez créé votre AMI à partir d'une instance existante, il est possible que cloud-init soit corrompu, désactivé ou absent, ce qui expliquerait pourquoi vos scripts User Data ne se déclenchent pas du tout.

Voici comment vérifier et réinstaller proprement cloud-init sur votre serveur avant de créer votre AMI.

1. Vérifier si cloud-init est présent
Connectez-vous à votre instance EC2 source et tapez :

Bash
cloud-init --version
Si vous obtenez une version : Il est installé.

Si "command not found" : Il est manquant.

2. Installation ou Réinstallation propre
Même s'il est présent, il est parfois préférable de le réinstaller pour remettre les configurations à zéro. Exécutez ces commandes :

Bash
# Mise à jour des dépôts
sudo apt-get update

# Installation de cloud-init
sudo apt-get install -y cloud-init

# S'assurer qu'il est activé au démarrage
sudo systemctl enable cloud-init
3. Nettoyer l'instance avant de créer l'AMI (Crucial)
C'est l'étape que beaucoup oublient. cloud-init garde en mémoire qu'il s'est déjà exécuté sur cette instance. Si vous ne le nettoyez pas, il croira qu'il n'a rien à faire lors du lancement de la nouvelle instance.

Bash
# Supprimer les logs et le cache de l'ancienne exécution
sudo cloud-init clean --logs
4. Vérifier la configuration des sources
Ouvrez le fichier de configuration pour vérifier qu'il accepte bien les User Data d'EC2 :

Bash
sudo nano /etc/cloud/cloud.cfg
Vérifiez que la ligne suivante est présente (généralement à la fin ou dans la section datasource_list) :

YAML
datasource_list: [ Ec2, None ]
Pourquoi est-ce que cela "bloquait" peut-être ?
Si vous avez créé votre AMI alors que l'instance avait déjà exécuté un script User Data par le passé, le fichier /var/lib/cloud/instance/boot-finished existe déjà. Au démarrage de la nouvelle instance, cloud-init voit ce fichier et se dit : "C'est bon, j'ai déjà travaillé, je ne fais rien".

La commande sudo cloud-init clean --logs est donc votre meilleure amie ici.

Test ultime après avoir lancé votre nouvelle instance :
Une fois l'AMI créée et l'instance lancée, si ça ne marche toujours pas, vérifiez ce fichier spécifique sur la nouvelle instance :

Bash
cat /var/log/cloud-init-output.log
Si ce fichier est vide ou n'existe pas : cloud-init ne s'est pas lancé (problème d'AMI ou de configuration).

Si ce fichier contient des erreurs : C'est votre script Bash qui a un bug (mais au moins, il s'est lancé !).

Essayez de nettoyer l'instance avec cloud-init clean, recréez l'AMI, et votre User Data devrait enfin s'exécuter.

