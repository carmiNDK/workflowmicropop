name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Mis à jour pour éviter le warning

      - name: Prepare Deployment Package
        run: |
          # On s'assure que les fichiers existent avant de continuer
          ls -R deploydoc/
          chmod +x deploydoc/deploy.sh
          cp deploydoc/appspec.yml .

      - name: Create package
        run: |
          zip -r deploydoc.zip appspec.yml deploydoc/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4 # Mis à jour
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip

      - name: Deploy via CodeDeploy
        run: |
          # TRÈS IMPORTANT : Vérifie que "micropop-app" et "micropop-dg" 
          # sont EXACTEMENT les noms dans ta console AWS (majuscules/minuscules)
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3