name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Deployment Package
        run: |
          # 1. Recherche des fichiers source
          DEPLOY_SH=$(find . -name "deploy.sh" | head -n 1)
          WAR_FILE=$(find . -name "workflowmicropop.war" | head -n 1)
          APPSPEC=$(find . -name "appspec.yml" | head -n 1)

          # 2. SUPPRESSION DE L'ERREUR 127 (Conversion CRLF vers LF)
          # Cette ligne est MAGIQUE : elle répare le formatage Windows pour Linux
          sed -i 's/\r$//' "$DEPLOY_SH"
          sed -i 's/\r$//' "$APPSPEC"

          # 3. Mise à plat des fichiers à la racine du ZIP
          cp "$DEPLOY_SH" ./deploy.sh
          cp "$WAR_FILE" ./workflowmicropop.war
          cp "$APPSPEC" ./appspec.yml
          
          # 4. Attribution des permissions d'exécution
          chmod +x ./deploy.sh

      - name: Create package
        run: |
          # Création du ZIP sans structure de dossiers complexe
          zip deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE