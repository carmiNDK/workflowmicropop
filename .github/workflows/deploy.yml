Gemini a dit
C'est une excellente nouvelle ! Si le ping fonctionne, le réseau est opérationnel.

Cependant, vos logs deploy.log montraient des erreurs "Network is unreachable" sur le port 80 (HTTP). Voici l'explication technique : le ping utilise le protocole ICMP, alors que apt-get et S3 utilisent HTTP/HTTPS.

Le problème vient du moment où le script s'exécute : le User Data se lance trop tôt, parfois quelques millisecondes avant que les routes DNS et HTTP ne soient stables.

Voici le script final, adapté avec une sécurité de timing pour forcer l'attente du réseau HTTP avant de commencer.

Bash
#!/bin/bash

# Redirection totale vers le log
exec > >(tee /home/ubuntu/deploy.log | logger -t user-data -s 2>/dev/console) 2>&1

echo "--- DÉMARRAGE DU DÉPLOIEMENT ---"

# --- Variables ---
REGION="eu-west-3"
S3_BUCKET="micropopdev"
S3_KEY="bundle.zip"
APP_DIR="/home/ubuntu/app"
WAR_FILE="workflowmicropop.war"
ASADMIN="/opt/payara/bin/asadmin"
PWD_FILE="/tmp/.asadmin_pass"

# 1. ATTENTE CRITIQUE DU RÉSEAU HTTP
# On boucle tant que google.com n'est pas joignable en HTTP (pas juste en ping)
echo "Attente de la connectivité HTTP complète..."
until curl -s --head http://www.google.com | grep "200 OK" > /dev/null; do
    echo "Le réseau HTTP n'est pas encore prêt... attente 5s"
    sleep 5
done
echo "Réseau HTTP opérationnel !"

# 2. Préparation
mkdir -p $APP_DIR
echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE
chmod 600 $PWD_FILE

# 3. Installation des outils (maintenant que le réseau est stable)
echo "Mise à jour des dépôts et installation des outils..."
apt-get update -y
apt-get install -y unzip awscli

# 4. TÉLÉCHARGEMENT S3 AVEC RETRY
echo "Téléchargement depuis S3..."
for i in {1..5}; do
    aws s3 cp s3://$S3_BUCKET/$S3_KEY $APP_DIR/bundle.zip --region $REGION
    if [ -f "$APP_DIR/bundle.zip" ]; then
        echo "Téléchargement S3 réussi."
        break
    fi
    echo "Échec tentative $i, nouvelle tentative dans 10s..."
    sleep 10
done

# 5. EXTRACTION
if [ -f "$APP_DIR/bundle.zip" ]; then
    unzip -o $APP_DIR/bundle.zip -d $APP_DIR
    chown -R ubuntu:ubuntu $APP_DIR
    echo "Contenu de $APP_DIR :"
    ls -l $APP_DIR
else
    echo "ERREUR : Impossible de télécharger le fichier après 5 tentatives."
    exit 1
fi

# 6. ATTENTE DE PAYARA
echo "Attente de l'ouverture du port admin 4848..."
while ! nc -z localhost 4848; do   
  sleep 5
done
echo "Payara est prêt sur le port 4848."

# 7. DÉPLOIEMENT
echo "Configuration Secure Admin..."
$ASADMIN --user admin --passwordfile $PWD_FILE enable-secure-admin
$ASADMIN --user admin --passwordfile $PWD_FILE restart-domain

# Attente après restart
sleep 20

echo "Déploiement du WAR..."
$ASADMIN --user admin --passwordfile $PWD_FILE deploy --force --contextroot /workflowmicropop $APP_DIR/$WAR_FILE

# Nettoyage
rm $PWD_FILE
echo "--- DÉPLOIEMENT TERMINÉ ---"
Pourquoi ce script va débloquer votre situation :
until curl ... : C'est la différence majeure. Le ping peut marcher alors que le proxy ou la table de routage HTTP n'est pas encore chargée. curl garantit que apt-get et aws s3 fonctionneront derrière.

nc -z localhost 4848 : On vérifie localement que le service Payara écoute bien avant d'envoyer les commandes.

Boucle de Retry S3 : Si le rôle IAM met du temps à se propager sur l'instance, le script n'abandonne pas tout de suite.

Dernier conseil :
Copiez ce code exactement. Lancez votre instance. Si ça échoue encore, faites cat /home/ubuntu/deploy.log. Si le log s'arrête à "Attente de la connectivité HTTP", c'est qu'il y a un Security Group Sortant (Outbound) qui bloque le port 80 ou 443, même si le ping (ICMP) passe.

Allez-y, c'est la bonne ! Votre DG sera fier de voir le déploiement automatique fonctionner.

