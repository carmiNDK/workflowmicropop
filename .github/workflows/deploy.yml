Gemini a dit
Le mystère est enfin résolu grâce à votre log. Ce n'est pas un problème de droits IAM (votre rôle est parfait), c'est un problème de dépôts Ubuntu.

Le Diagnostic Technique
Package awscli is not available : Votre instance Ubuntu n'arrive pas à télécharger l'outil AWS car elle ne trouve pas les serveurs de mise à jour.

aws: command not found : Comme l'installation a échoué, la commande de téléchargement S3 ne peut pas fonctionner.

Pourquoi ? Vous utilisez l'AMI Ubuntu 24.04 (Noble Numbat). Sur cette version très récente, les dépôts ont parfois des instabilités au boot ou nécessitent une syntaxe spécifique.

La Solution "Zéro Dépendance"
Pour réussir devant votre DG maintenant, on va arrêter d'essayer d'installer l'outil AWS avec apt. On va utiliser le binaire officiel pré-compilé d'Amazon. C'est beaucoup plus fiable.

Voici le script modifié pour fonctionner même si apt-get fait des siennes :

Bash
#!/bin/bash

# Redirection totale
exec > >(tee /home/ubuntu/deploy.log | logger -t user-data -s 2>/dev/console) 2>&1

echo "--- DEPLOIEMENT SANS APT-GET ---"

# --- Variables ---
REGION="eu-west-3"
S3_BUCKET="micropopdev"
S3_KEY="bundle.zip"
APP_DIR="/home/ubuntu/app"
WAR_FILE="workflowmicropop.war"
ASADMIN="/opt/payara/bin/asadmin"
PWD_FILE="/tmp/.asadmin_pass"

# 1. Attente Réseau
echo "Attente réseau..."
sleep 15

# 2. INSTALLATION MANUELLE DE AWS CLI (On ne passe plus par apt)
echo "Installation manuelle de l'AWS CLI..."
apt-get update -y || true
apt-get install -y unzip curl
curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
unzip -o awscliv2.zip
sudo ./aws/install --update
# Vérification
/usr/local/bin/aws --version

# 3. TELECHARGEMENT S3 (Avec le nouveau chemin de aws)
mkdir -p $APP_DIR
echo "Téléchargement du WAR..."
/usr/local/bin/aws s3 cp s3://$S3_BUCKET/$S3_KEY $APP_DIR/bundle.zip --region $REGION

# 4. EXTRACTION
if [ -f "$APP_DIR/bundle.zip" ]; then
    unzip -o $APP_DIR/bundle.zip -d $APP_DIR
    chown -R ubuntu:ubuntu $APP_DIR
    echo "Fichier dézippé."
else
    echo "ERREUR : S3 a échoué même avec l'install manuelle."
    exit 1
fi

# 5. AUTHENTIFICATION PAYARA
echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE

# 6. ATTENTE ET DEPLOIEMENT
echo "Attente de Payara sur le port 4848..."
while ! nc -z localhost 4848; do   
  sleep 5
done

echo "Configuration Admin..."
$ASADMIN --user admin --passwordfile $PWD_FILE enable-secure-admin
$ASADMIN --user admin --passwordfile $PWD_FILE restart-domain

sleep 20

echo "Déploiement final..."
$ASADMIN --user admin --passwordfile $PWD_FILE deploy --force --contextroot /workflowmicropop $APP_DIR/$WAR_FILE

rm $PWD_FILE
echo "--- FIN ---"
Pourquoi cela va marcher cette fois :
Indépendance : On télécharge l'outil AWS directement depuis les serveurs d'Amazon (awscli-exe-linux-x86_64.zip) au lieu de compter sur les dépôts Ubuntu qui vous disent "Package not available".

Chemin Forcé : On utilise /usr/local/bin/aws pour être certain de lancer le bon programme.

Résilience : Même si apt-get update échoue partiellement, le script continue car il installe lui-même ses outils critiques.

Action : Remplacez votre User Data par celui-ci. Si le dossier /app est enfin plein, vous avez gagné votre pari !

