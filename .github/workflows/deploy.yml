      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Préparation des permissions et de l'archive
        run: |
          # 1. On donne les droits d'exécution au script deploy.sh
          chmod +x deploydoc/deploy.sh
          
          # 2. On copie l'appspec à la racine pour CodeDeploy
          cp deploydoc/appspec.yml .
          
          # 3. On crée le bundle (on inclut le dossier deploydoc et l'appspec)
          zip -r bundle.zip appspec.yml deploydoc/

      - name: Upload du bundle sur S3
        run: |
          aws s3 cp bundle.zip s3://micropopdev/bundle.zip

      - name: Déclenchement CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name MicropopApp \
            --deployment-group-name MicropopDeploymentGroup \
            --s3-location bucket=micropopdev,key=bundle.zip,bundleType=zip
