name: Build and Deploy JavaEE WAR to EC2

on:
  workflow_dispatch: {}
  schedule:
    # 23:45 UTC = 00:45 à Kinshasa
    - cron: '33 23 * * 1'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build WAR
        run: |
          cd "workflowprov1.0"
          mkdir -p build/WEB-INF/classes
          mkdir -p dist
          find src -name "*.java" > sources.txt
          LIBS=$(find . -name "*.jar" | tr '\n' ':')
          javac -d build/WEB-INF/classes -cp "$LIBS" @sources.txt
          cp -r WebContent/* build/
          cd build && jar -cvf ../dist/workflowmicropop.war .

      - name: Prepare Package
        run: |
          rm -rf ./out_package deploydoc.zip
          mkdir -p ./out_package
          # On utilise les chemins exacts vus sur ton image
          cp "workflowprov1.0/dist/workflowmicropop.war" ./out_package/
          cat "workflowprov1.0/deploydoc/deploy.sh" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/deploy.sh
          cat "workflowprov1.0/deploydoc/appspec.yml" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/appspec.yml
          chmod +x ./out_package/deploy.sh

      - name: Create Zip
        run: cd ./out_package && zip ../deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: AWS Config
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload and Deploy
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE