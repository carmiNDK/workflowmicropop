Gemini a dit
C'est tout à fait normal. Par défaut, l'utilitaire asadmin de Payara (ou GlassFish) demande une authentification dès que l'administration sécurisée est activée. En mode non interactif (dans un script), la commande échoue car elle ne peut pas vous demander le mot de passe.

Pour résoudre cela, il faut utiliser un fichier de mot de passe (--passwordfile) pour que asadmin puisse s'authentifier automatiquement.

Le problème
Dans votre script actuel, la commande deploy bloque car Payara attend une saisie clavier pour le login/password.

La solution : User Data Adapté
Voici votre script modifié. J'ai ajouté la création d'un fichier temporaire contenant vos identifiants et l'argument --passwordfile dans les commandes de déploiement.

Bash
#!/bin/bash
# =========================
# User Data ultime - Déploiement automatique WAR sur Payara
# =========================

# --- Variables ---
REGION="eu-west-3"
S3_BUCKET="micropopdev"
S3_KEY="bundle.zip"
APP_DIR="/home/ubuntu/app"
WAR_FILE="workflowmicropop.war"
PAYARA_PATH="/opt/payara/bin/asadmin"
CONTEXT_ROOT="/workflowmicropop"
LOG_FILE="/home/ubuntu/deploy.log"

# --- Identifiants Payara ---
PAYARA_USER="admin"
PAYARA_PWD="micropop"
PWD_FILE="/home/ubuntu/.asadmin_pass"

# --- Préparer le dossier de déploiement ---
mkdir -p $APP_DIR
chown ubuntu:ubuntu $APP_DIR

# --- Créer le fichier de mot de passe pour l'authentification automatique ---
# Format requis par asadmin : AS_ADMIN_PASSWORD=votre_mot_de_passe
echo "AS_ADMIN_PASSWORD=$PAYARA_PWD" > $PWD_FILE
chmod 600 $PWD_FILE
chown ubuntu:ubuntu $PWD_FILE

# --- Installer dépendances ---
apt-get update -y >> $LOG_FILE 2>&1
apt-get install -y unzip awscli >> $LOG_FILE 2>&1

# --- Télécharger et dézipper le bundle depuis S3 ---
echo "$(date) - Téléchargement du bundle depuis S3..." | tee -a $LOG_FILE
aws s3 cp s3://$S3_BUCKET/$S3_KEY $APP_DIR/bundle.zip --region $REGION >> $LOG_FILE 2>&1
unzip -o $APP_DIR/bundle.zip -d $APP_DIR >> $LOG_FILE 2>&1

# --- Attendre que Payara soit prêt ---
echo "$(date) - Vérification que Payara est démarré..." | tee -a $LOG_FILE
for i in {1..20}; do
    # On ajoute les credentials ici aussi pour le list-domains
    $PAYARA_PATH --user $PAYARA_USER --passwordfile $PWD_FILE list-domains | grep server >> $LOG_FILE 2>&1
    if [ $? -eq 0 ]; then
        echo "$(date) - Payara détecté, prêt pour le déploiement." | tee -a $LOG_FILE
        break
    fi
    echo "$(date) - Payara pas encore prêt, attente 10s..." | tee -a $LOG_FILE
    sleep 10
done

# --- Déployer le WAR sur Payara ---
if [ -f "$APP_DIR/$WAR_FILE" ]; then
    echo "$(date) - Déploiement de $WAR_FILE sur $CONTEXT_ROOT..." | tee -a $LOG_FILE
    
    # Vérifier si l'application existe déjà (avec auth)
    $PAYARA_PATH --user $PAYARA_USER --passwordfile $PWD_FILE list-applications | grep workflowmicropop >> $LOG_FILE 2>&1
    if [ $? -eq 0 ]; then
        echo "$(date) - Undeploy de l'application existante..." | tee -a $LOG_FILE
        $PAYARA_PATH --user $PAYARA_USER --passwordfile $PWD_FILE undeploy workflowmicropop >> $LOG_FILE 2>&1
    fi

    # Déployer avec contexte spécifique et authentification automatique
    $PAYARA_PATH --user $PAYARA_USER --passwordfile $PWD_FILE deploy --force --contextroot $CONTEXT_ROOT $APP_DIR/$WAR_FILE >> $LOG_FILE 2>&1
    echo "$(date) - Déploiement terminé !" | tee -a $LOG_FILE
else
    echo "$(date) - Erreur : $WAR_FILE non trouvé dans $APP_DIR" | tee -a $LOG_FILE
fi

# --- Redémarrage de Payara (optionnel si le deploy suffit) ---
$PAYARA_PATH --user $PAYARA_USER --passwordfile $PWD_FILE restart-domain >> $LOG_FILE 2>&1

# Nettoyage du fichier de mot de passe (sécurité)
rm $PWD_FILE

echo "$(date) - Payara redémarré, déploiement complet." | tee -a $LOG_FILE
Ce qui a été ajouté :
PWD_FILE="/home/ubuntu/.asadmin_pass" : Un chemin pour stocker temporairement le mot de passe.

echo "AS_ADMIN_PASSWORD=$PAYARA_PWD" > $PWD_FILE : asadmin exige un format spécifique dans le fichier. La variable doit s'appeler exactement AS_ADMIN_PASSWORD.

--user $PAYARA_USER --passwordfile $PWD_FILE : Ces arguments ont été ajoutés à chaque appel de $PAYARA_PATH. C'est ce qui permet de "sauter" l'étape où le terminal vous demande le login.

rm $PWD_FILE : Par mesure de sécurité, on supprime le fichier contenant le mot de passe en clair à la fin de l'exécution du script.

