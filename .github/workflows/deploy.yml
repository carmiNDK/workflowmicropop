name: Build and Deploy JavaEE WAR to EC2

on:
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build WAR
        run: |
          cd "workflowprov1.0"
          mkdir -p build/WEB-INF/classes
          mkdir -p dist
          
          # 1. Dépendances
          curl -L https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/3.1.0/javax.servlet-api-3.1.0.jar -o servlet-api.jar
          curl -L https://repo1.maven.org/maven2/javax/servlet/jsp/javax.servlet.jsp-api/2.3.1/javax.servlet.jsp-api-2.3.1.jar -o jsp-api.jar
          curl -L https://repo1.maven.org/maven2/javax/annotation/javax.annotation-api/1.3.2/javax.annotation-api-1.3.2.jar -o annotation-api.jar

          # 2. Nettoyage des variables (Indispensable)
          find src -name "*.java" -exec sed -i 's/Ã©/e/g' {} +
          find src -name "*.java" -exec sed -i 's/é/e/g' {} +
          find src -name "*.java" -exec sed -i 's/\xc2\xa9//g' {} +

          # 3. Classpath
          CLASSPATH=$(find . -name "*.jar" | tr '\n' ':')

          # 4. COMPILATION OPTIMISÉE (-g:none réduit la taille du bytecode)
          # On retire les informations de débug pour gagner de la place
          find src -name "*.java" > sources.txt
          javac -g:none -encoding ISO-8859-1 -d build/WEB-INF/classes -cp "$CLASSPATH" @sources.txt

          # 5. Assemblage
          cp -r WebContent/* build/
          cd build && jar -cvf ../dist/workflowmicropop.war .
          
      - name: Prepare Package
        run: |
          rm -rf ./out_package deploydoc.zip
          mkdir -p ./out_package
          cp "workflowprov1.0/dist/workflowmicropop.war" ./out_package/
          cat "workflowprov1.0/deploydoc/deploy.sh" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/deploy.sh
          cat "workflowprov1.0/deploydoc/appspec.yml" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/appspec.yml
          chmod +x ./out_package/deploy.sh

      - name: AWS Deploy
        run: |
          cd ./out_package && zip ../deploydoc.zip appspec.yml deploy.sh workflowmicropop.war
          cd ..
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_KEY }}
          export AWS_DEFAULT_REGION=eu-west-3
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE