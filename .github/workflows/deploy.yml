name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Lister tous les fichiers
        run: |
          echo "Recherche du fichier deploy.sh..."
          find . -name "deploy.sh"

      - name: Prepare Deployment Package
        run: |
          # Cette commande va chercher le script peu importe où il est et le rendre exécutable
          SCRIPT_PATH=$(find . -name "deploy.sh")
          if [ -z "$SCRIPT_PATH" ]; then
            echo "ERREUR : deploy.sh est introuvable dans tout le projet !"
            exit 1
          fi
          chmod +x "$SCRIPT_PATH"
          
          # On récupère le dossier parent du script (qui doit être deploydoc)
          DEPLOY_DIR=$(dirname "$SCRIPT_PATH")
          
          # On place l'appspec à la racine pour CodeDeploy
          cp "$DEPLOY_DIR/appspec.yml" .

      - name: Create package
        run: |
          # On zip l'appspec et le contenu du dossier qui contient deploy.sh
          # On identifie dynamiquement le dossier
          DEPLOY_DIR=$(dirname $(find . -name "deploy.sh"))
          zip -r deploydoc.zip appspec.yml "$DEPLOY_DIR"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE