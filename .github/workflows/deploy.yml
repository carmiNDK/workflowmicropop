Étape 4 : Configurer Jenkins sur son EC2
Accès Git : Configurez votre Webhook Git pour que Jenkins soit prévenu à chaque push.

Installation du plugin AWS : Installez le plugin "AWS CodeDeploy Plugin" dans Jenkins.

Configuration du Job Jenkins (Pipeline ou Freestyle) :

Phase Build : Jenkins compile votre projet (mvn clean package).

Phase Post-Build :

Jenkins crée le dossier de déploiement contenant le .war, le appspec.yml et le dossier scripts/.

Jenkins compresse le tout en bundle.zip.

Jenkins envoie ce bundle.zip sur votre bucket S3 :
aws s3 cp bundle.zip s3://micropopdev/bundle.zip

Jenkins appelle l'API CodeDeploy pour créer un nouveau déploiement.

Étape 5 : Configurer AWS CodeDeploy (Console AWS)
Créer une Application : Dans CodeDeploy, nommez-la (ex: MicropopApp).

Créer un Groupe de Déploiement :

Associez-le à votre Auto Scaling Group.

Choisissez le type de déploiement "In-place" (pour mettre à jour les instances existantes).

Lien avec S3 : Indiquez à CodeDeploy que le code se trouve dans s3://micropopdev/bundle.zip.

Pourquoi cette méthode est la meilleure ?
Jenkins s'occupe de la fabrication (Build).

S3 stocke votre "Artéfact" (le bundle prêt à l'emploi).

CodeDeploy s'occupe de la distribution : il contacte chaque agent sur vos EC2, leur demande de télécharger le zip et d'exécuter vos scripts asadmin.

L'Auto Scaling Group : Si une nouvelle instance démarre, elle utilisera votre UserData "Grand Maître" pour récupérer le dernier bundle.zip sur S3 et sera immédiatement à jour.

Dès que vous faites un git push, tout s'enchaîne : votre code arrive sur vos serveurs en quelques minutes sans aucune action manuelle de votre part !

