Gemini a dit
Le log est clair comme de l'eau de roche maintenant : exit code 127 et cannot execute: required file not found.

C'est exactement ce que je soupçonnais : ton fichier deploy.sh a été enregistré avec des fins de ligne Windows (CRLF). Pour Linux, la première ligne n'est pas #!/bin/bash, mais #!/bin/bash\r. Comme le programme bash\r n'existe pas, il plante avant même de créer le log.

Voici la procédure de correction définitive. On va forcer la conversion au format Linux directement dans GitHub Actions pour que tu n'aies plus jamais ce problème.

1. Le fichier .github/workflows/deploy.yml (À copier-coller)
J'ai ajouté une sécurité supplémentaire pour nettoyer les fichiers et s'assurer que l'agent CodeDeploy les voit correctement.

YAML
name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Deployment Package
        run: |
          # 1. Trouver les fichiers peu importe où ils sont
          DEPLOY_SH=$(find . -name "deploy.sh" | head -n 1)
          WAR_FILE=$(find . -name "workflowmicropop.war" | head -n 1)
          APPSPEC=$(find . -name "appspec.yml" | head -n 1)

          # 2. NETTOYAGE CRUCIAL (Conversion Windows -> Linux)
          # Cela supprime les caractères \r qui causent l'erreur 127
          sed -i 's/\r$//' "$DEPLOY_SH"
          sed -i 's/\r$//' "$APPSPEC"

          # 3. Mise à plat à la racine
          cp "$DEPLOY_SH" ./deploy.sh
          cp "$WAR_FILE" ./workflowmicropop.war
          cp "$APPSPEC" ./appspec.yml
          
          # 4. Droits d'exécution
          chmod +x ./deploy.sh

      - name: Create package
        run: |
          zip deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE