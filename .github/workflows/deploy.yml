Bash
#!/bin/bash
# Redirection de TOUTE la sortie (erreurs incluses) vers le log pour ne rien rater
exec > >(tee /home/ubuntu/deploy.log | logger -t user-data -s 2>/dev/console) 2>&1

echo "--- DEBUT DU DEPLOIEMENT : $(date) ---"

# --- Variables ---
REGION="eu-west-3"
S3_BUCKET="micropopdev"
S3_KEY="bundle.zip"
APP_DIR="/home/ubuntu/app"
WAR_FILE="workflowmicropop.war"
PAYARA_PATH="/opt/payara/bin/asadmin"
PWD_FILE="/tmp/.asadmin_pass"

# 1. Attendre que le réseau soit opérationnel
echo "Vérification de la connectivité réseau..."
until ping -c 1 google.com &>/dev/null; do
    echo "En attente du réseau..."
    sleep 2
done

# 2. Nettoyage et création du dossier
rm -rf $APP_DIR
mkdir -p $APP_DIR
chown ubuntu:ubuntu $APP_DIR

# 3. Installation forcée de l'AWS CLI (au cas où elle manquerait dans l'AMI)
apt-get update -y
apt-get install -y unzip awscli

# 4. Tentative de téléchargement avec REPRISE si échec
echo "Téléchargement depuis S3 : s3://$S3_BUCKET/$S3_KEY"
for i in {1..5}; do
    aws s3 cp s3://$S3_BUCKET/$S3_KEY $APP_DIR/bundle.zip --region $REGION
    if [ -f "$APP_DIR/bundle.zip" ]; then
        echo "Téléchargement réussi à la tentative $i"
        break
    else
        echo "Échec tentative $i, nouvel essai dans 5s..."
        sleep 5
    fi
done

# 5. Extraction
if [ -f "$APP_DIR/bundle.zip" ]; then
    unzip -o $APP_DIR/bundle.zip -d $APP_DIR
    chown -R ubuntu:ubuntu $APP_DIR
    echo "Fichiers présents dans $APP_DIR :"
    ls -l $APP_DIR
else
    echo "ERREUR CRITIQUE : Impossible de récupérer le bundle S3 après 5 essais."
    exit 1
fi

# 6. Authentification Payara
echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE
chmod 600 $PWD_FILE

# 7. Attendre que Payara soit prêt avant de déployer
echo "Attente de Payara (max 5 min)..."
for i in {1..30}; do
    if $PAYARA_PATH list-domains | grep -q "running"; then
        echo "Payara est prêt."
        break
    fi
    sleep 10
done

# 8. Activation Admin et Déploiement
echo "Configuration Admin et Déploiement..."
$PAYARA_PATH --user admin --passwordfile $PWD_FILE enable-secure-admin
$PAYARA_PATH restart-domain
sleep 20

$PAYARA_PATH --user admin --passwordfile $PWD_FILE deploy --force --contextroot /workflowmicropop $APP_DIR/$WAR_FILE

echo "--- FIN DU SCRIPT : $(date) ---"
rm -f $PWD_FILE
Pourquoi c'est différent cette fois-ci ?
exec > >(...) : Cette ligne au début est cruciale. Elle force l'envoi de chaque message d'erreur dans le fichier deploy.log. Si aws s3 cp échoue, vous verrez l'erreur exacte (ex: "403 Forbidden" ou "Command not found").

Boucle de Ping : On s'assure que l'instance "voit" internet avant de lancer les commandes AWS.

Boucle de tentatives S3 : Parfois, l'IAM Role met quelques secondes de plus que le script à être actif. En essayant 5 fois, on élimine ce problème de timing.

rm -f $PWD_FILE à la fin : On nettoie proprement.

