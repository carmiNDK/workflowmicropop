echo "Le User Data fonctionne" > /home/ubuntu/TEST_SUCCESS/bravo.txt
touch /tmp/it_works.txt
Si après 2 minutes, le dossier TEST_SUCCESS n'existe pas, votre AMI est "sourde" au User Data. Il faut réinstaller cloud-init (comme vu précédemment).

Si le dossier TEST_SUCCESS existe, alors c'est mon script précédent qui bloquait sur une commande (probablement l'accès S3).

