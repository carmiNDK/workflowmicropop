2. Le fichier deploydoc/deploy.sh (Optimisé)
On utilise la variable $LIFECYCLE_EVENT d'AWS pour que le script sache s'il doit arrêter ou installer.

Bash
#!/bin/bash
# Redirection pour debug
exec > >(tee -a /home/ubuntu/deploy_script.log) 2>&1

APP_DIR="/home/ubuntu/app"
WAR_FILE="workflowmicropop.war"
ASADMIN="/opt/payara/bin/asadmin"
PWD_FILE="/tmp/.asadmin_pass"

echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE

if [ "$LIFECYCLE_EVENT" == "ApplicationStop" ]; then
    echo "=== ETAPE STOP : Désinstallation de l'ancienne version ==="
    $ASADMIN --user admin --passwordfile $PWD_FILE undeploy workflowmicropop || echo "Pas d'application à retirer."

elif [ "$LIFECYCLE_EVENT" == "AfterInstall" ]; then
    echo "=== ETAPE INSTALL : Déploiement du nouveau WAR ==="
    
    # Attente Payara
    until nc -z localhost 4848; do
      echo "Attente Payara port 4848..."
      sleep 5
    done

    echo "Déploiement en cours..."
    $ASADMIN --user admin --passwordfile $PWD_FILE deploy \
      --force \
      --contextroot /workflowmicropop \
      $APP_DIR/$WAR_FILE
      
    if [ $? -eq 0 ]; then
        echo "=== DEPLOY SUCCESS ==="
    else
        echo "=== DEPLOY FAILED ==="
        exit 1
    fi
fi

rm -f $PWD_FILE
3. Le fichier .github/workflows/deploy.yml (Le moteur)
Ici, le secret est de donner les droits d'exécution au script avant de l'envoyer à AWS, sinon CodeDeploy restera muet.

YAML
name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Preparation et Permissions
        run: |
          # On rend le script exécutable AVANT de zipper
          chmod +x deploydoc/deploy.sh
          # On copie l'appspec à la racine pour qu'AWS le voie immédiatement
          cp deploydoc/appspec.yml .

      - name: Create Package and Upload
        run: |
          zip -r bundle.zip appspec.yml deploydoc/
          aws s3 cp bundle.zip s3://micropopdev/bundle.zip

      - name: AWS CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name MicropopApp \
            --deployment-group-name MicropopDeploymentGroup \
            --s3-location bucket=micropopdev,key=bundle.zip,bundleType=zip
💡 Pourquoi ça va marcher maintenant ?
L'utilisateur root : Dans l' appspec, runas: root permet au script de créer le fichier /tmp/.asadmin_pass et de lancer asadmin sans erreur de permission.

Le chmod +x : GitHub Actions va maintenant marquer ton script comme "exécutable" avant de le mettre dans le ZIP. Sans ça, l'EC2 refuse de le lancer.

L'ordre des fichiers : En copiant appspec.yml à la racine dans le workflow, CodeDeploy ne cherchera pas midi à quatorze heures, il trouvera les instructions tout de suite.

