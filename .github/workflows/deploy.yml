3. Configuration du projet (Le fichier appspec.yml)
CodeDeploy a besoin d'un fichier nommé appspec.yml à la racine de votre bundle.zip. Ce fichier dit à CodeDeploy quoi faire.

Créez un fichier appspec.yml :

YAML
version: 0.0
os: linux
files:
  - source: /workflowmicropop.war
    destination: /home/ubuntu/app/
hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 300
  AfterInstall:
    - location: scripts/deploy_war.sh
      timeout: 600
Note : Vous devrez créer un dossier scripts/ dans votre projet Git contenant les commandes asadmin (undeploy/deploy) que nous avons validées ensemble.

4. Configuration de Jenkins (L'Automatisation)
A. Installation de Jenkins sur son EC2
Installez Java et Jenkins.

Installez le plugin "AWS CodeDeploy Plugin".

Configurez vos credentials AWS dans Jenkins (IAM User avec accès S3 et CodeDeploy).

B. Le Pipeline Jenkins (Script ou Freestyle)
Dans votre job Jenkins, après le build (mvn clean package) :

Archive : Créez le bundle.zip incluant le .war et le appspec.yml.

Upload : Poussez le zip sur S3 via une commande shell :
aws s3 cp bundle.zip s3://micropopdev/bundle.zip

Deploy : Utilisez l'étape CodeDeploy du plugin pour créer un déploiement sur votre Deployment Group associé à votre ASG.

5. Pourquoi c'est la solution parfaite ?
Les instances existantes : CodeDeploy va déclencher les scripts sur toutes les instances qui tournent déjà. Votre application passera en V2 sans redémarrage de l'EC2.

Les nouvelles instances (ASG) : Si une instance est créée par l'ASG, votre User Data actuel va s'exécuter, aller sur S3, et télécharger la dernière version (la V2) automatiquement.

Cohérence : Que ce soit une mise à jour (CodeDeploy) ou un remplacement d'instance (User Data), tout le monde pointe vers le même bundle.zip sur S3.

Le rôle de votre User Data "Grand Maître"
Votre User Data actuel reste votre "assurance vie". Il garantit que n'importe quelle nouvelle machine est prête immédiatement. CodeDeploy, lui, est votre "livreur" qui apporte les nouvelles versions aux machines déjà en place.

