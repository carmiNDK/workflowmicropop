Le Rôle IAM (Le plus probable) : Quand vous avez créé votre Launch Template (Modèle de lancement), avez-vous bien sélectionné un "Instance Profile" (Rôle IAM) ? Si vous l'avez oublié, aws s3 cp ne marchera jamais de façon automatique.

Le délai : Le User Data s'exécute pendant que Payara essaie de démarrer. S'ils se battent pour la mémoire RAM sur une petite instance (T2.micro/T3.micro), l'un des deux peut crasher.

L'utilisateur : Le script User Data tourne en root. Si Payara a été installé par l'utilisateur ubuntu avec des scripts de démarrage spécifiques, asadmin (lancé par root) pourrait ne pas trouver le domaine.

