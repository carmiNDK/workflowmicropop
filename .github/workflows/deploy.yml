name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Deployment Package
        run: |
          # On rend le script exécutable dans son dossier d'origine
          chmod +x deploydoc/deploy.sh
          # On ramène TOUT à la racine du workspace pour le ZIP
          cp deploydoc/deploy.sh .
          cp deploydoc/workflowmicropop.war .
          cp deploydoc/appspec.yml .

      - name: Create package
        run: |
          # On zip uniquement les fichiers à la racine
          zip deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE