Étape 2 : Le fichier deploydoc/deploy.sh
Pourquoi le modifier ? On ajoute la redirection vers un log (/home/ubuntu/deploy_script.log) et on utilise $LIFECYCLE_EVENT pour ne pas faire deux fois la même chose.

Bash
#!/bin/bash
# Redirection des erreurs et sorties vers le log pour le debug
exec > >(tee -a /home/ubuntu/deploy_script.log) 2>&1

# Définition des chemins (on pointe vers le WAR à l'intérieur de deploydoc)
APP_DIR="/home/ubuntu/app/deploydoc"
WAR_FILE="workflowmicropop.war"
ASADMIN="/opt/payara/bin/asadmin"
PWD_FILE="/tmp/.asadmin_pass"

# Création du mot de passe
echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE

if [ "$LIFECYCLE_EVENT" == "ApplicationStop" ]; then
    echo "--- [$(date)] STOP EVENT : Undeploy de l'ancienne version ---"
    $ASADMIN --user admin --passwordfile $PWD_FILE undeploy workflowmicropop || echo "Application non trouvée, rien à retirer."

elif [ "$LIFECYCLE_EVENT" == "AfterInstall" ]; then
    echo "--- [$(date)] AFTERINSTALL EVENT : Déploiement du nouveau WAR ---"
    
    # Vérification du port Payara
    echo "Vérification de Payara sur le port 4848..."
    while ! nc -z localhost 4848; do 
        echo "Payara n'est pas encore prêt... attente 5s"
        sleep 5
    done
    
    echo "Lancement du déploiement de $WAR_FILE..."
    $ASADMIN --user admin --passwordfile $PWD_FILE deploy \
      --force \
      --contextroot /workflowmicropop \
      $APP_DIR/$WAR_FILE
    
    if [ $? -eq 0 ]; then
        echo "=== [$(date)] SUCCESS : Déploiement terminé avec succès ==="
    else
        echo "=== [$(date)] ERROR : Échec du déploiement ==="
        exit 1
    fi
fi

# Ménage
rm -f $PWD_FILE
