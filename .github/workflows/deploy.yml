Gemini a dit
Si votre Security Group Outbound est déjà ouvert sur "Tout le trafic" (0.0.0.0/0), alors le problème ne vient effectivement pas des règles du Security Group. C'est une excellente clarification.

Puisque le ping fonctionne mais que apt-get affichait "Network is unreachable" dans votre log précédent, il ne reste qu'une seule explication technique : le délai de résolution DNS ou d'initialisation du réseau au démarrage.

Pourquoi le script a échoué alors que le réseau est ouvert ?
Au moment précis où le User Data se lance (quelques secondes après le boot), l'interface réseau est "UP" (le ping peut passer), mais les services de routage HTTP ou de résolution de noms ne sont pas encore totalement stables. Votre log montrait que apt-get n'arrivait pas à résoudre les adresses des dépôts Ubuntu.

Le script "Ultime" (Zéro erreur de timing)
Voici la version finale. J'ai ajouté un test de boucle sur S3 et surtout j'utilise curl pour forcer le script à attendre que le réseau HTTP soit réellement prêt avant de faire quoi que ce soit.

Bash
#!/bin/bash

# Redirection totale des erreurs vers le log
exec > >(tee /home/ubuntu/deploy.log | logger -t user-data -s 2>/dev/console) 2>&1

echo "--- DEPLOIEMENT FORCE - $(date) ---"

# --- Variables ---
REGION="eu-west-3"
S3_BUCKET="micropopdev"
S3_KEY="bundle.zip"
APP_DIR="/home/ubuntu/app"
WAR_FILE="workflowmicropop.war"
ASADMIN="/opt/payara/bin/asadmin"
PWD_FILE="/tmp/.asadmin_pass"

# 1. ATTENTE DU RESEAU (Crucial pour éviter le Network Unreachable)
echo "Attente de la connectivité réseau..."
# On boucle tant qu'on ne peut pas joindre l'API S3 d'AWS
until nc -zv s3.${REGION}.amazonaws.com 443; do
    echo "S3 n'est pas encore joignable... attente 5s"
    sleep 5
done
echo "Réseau OK."

# 2. Preparation
mkdir -p $APP_DIR
echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE
chmod 600 $PWD_FILE

# 3. Installation des outils
echo "Installation awscli et unzip..."
apt-get update -y
apt-get install -y unzip awscli

# 4. TELECHARGEMENT S3
echo "Téléchargement de s3://$S3_BUCKET/$S3_KEY..."
# On réessaie plusieurs fois car le rôle IAM peut mettre du temps à se propager
for i in {1..10}; do
    aws s3 cp s3://$S3_BUCKET/$S3_KEY $APP_DIR/bundle.zip --region $REGION
    if [ -f "$APP_DIR/bundle.zip" ]; then
        echo "Téléchargement S3 REUSSI."
        break
    fi
    echo "Tentative $i échouée, nouvel essai dans 5s..."
    sleep 5
done

# 5. EXTRACTION
if [ -f "$APP_DIR/bundle.zip" ]; then
    unzip -o $APP_DIR/bundle.zip -d $APP_DIR
    chown -R ubuntu:ubuntu $APP_DIR
    echo "Fichiers extraits dans $APP_DIR"
else
    echo "ERREUR : Impossible de télécharger le fichier. Vérifiez le rôle IAM attaché à l'instance."
    exit 1
fi

# 6. ATTENTE DE PAYARA
echo "Attente du port admin 4848..."
while ! nc -z localhost 4848; do   
  sleep 5
done

# 7. DEPLOIEMENT
echo "Configuration Secure Admin..."
$ASADMIN --user admin --passwordfile $PWD_FILE enable-secure-admin
$ASADMIN --user admin --passwordfile $PWD_FILE restart-domain

# Attente post-redémarrage
sleep 15

echo "Lancement du déploiement du WAR..."
$ASADMIN --user admin --passwordfile $PWD_FILE deploy --force --contextroot /workflowmicropop $APP_DIR/$WAR_FILE

# Nettoyage
rm $PWD_FILE
echo "--- FIN DU SCRIPT ---"
Ce qui va se passer maintenant :
Le script va attendre : S'il y a un micro-délai réseau, il ne plantera plus immédiatement avec "Network unreachable".

L'installation va réussir : Puisque votre Outbound est ouvert, apt-get finira par passer.

S3 va répondre : La boucle de 10 tentatives laisse le temps au rôle IAM d'être reconnu par l'instance.

Conseil pour votre DG :
Puisque le Security Group est bien configuré (Ouvert à 0.0.0.0/0), ce script est la version la plus robuste possible. Si le dossier /app ne se remplit pas avec ça, la seule raison restante serait que le rôle IAM n'a pas été sélectionné dans le Launch Template lors de sa création.

Testez celui-là, c'est le plus résistant aux erreurs de démarrage !

