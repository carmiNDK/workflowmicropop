name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '30 18 * * 1' # Lundi 19h30 Kinshasa (UTC+1)
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # FORCE BUILD WAR (NO REUSE)
      # =========================
      - name: Build fresh WAR (NO OLD VERSION)
        run: |
          echo "🔨 Génération FORCÉE du WAR..."

          # nettoyage ancien war éventuel
          rm -f workflowmicropop.war

          # tentative build Java EE simple
          if [ -d "./src" ]; then
            echo "📦 Compilation Java EE..."

            mkdir -p build_temp
            find . -name "*.java" > sources.txt

            if [ -s sources.txt ]; then
              javac -d build_temp @sources.txt

              jar -cvf workflowmicropop.war -C build_temp .
              echo "✅ WAR généré avec succès"
            else
              echo "❌ Aucun fichier Java trouvé"
              exit 1
            fi
          else
            echo "❌ Projet Java EE invalide (pas de src)"
            exit 1
          fi

      # =========================
      # DEPLOY PACKAGE (deploydoc)
      # =========================
      - name: Prepare deploydoc package
        run: |
          echo "📦 Création dossier deploydoc..."

          rm -rf deploydoc deploydoc.zip
          mkdir -p deploydoc

          DEPLOY_SH_SRC=$(find . -name "deploy.sh" -type f | head -n 1)
          APPSPEC_SRC=$(find . -name "appspec.yml" -type f | head -n 1)

          if [ ! -f "$DEPLOY_SH_SRC" ] || [ ! -f "$APPSPEC_SRC" ]; then
            echo "❌ deploy.sh ou appspec.yml introuvable"
            exit 1
          fi

          cp workflowmicropop.war deploydoc/
          cat "$DEPLOY_SH_SRC" | tr -d '\r' | iconv -t UTF-8//IGNORE > deploydoc/deploy.sh
          cat "$APPSPEC_SRC" | tr -d '\r' | iconv -t UTF-8//IGNORE > deploydoc/appspec.yml

          chmod +x deploydoc/deploy.sh

          echo "📊 Contenu deploydoc:"
          ls -lh deploydoc

      - name: Create ZIP package
        run: |
          zip -r deploydoc.zip deploydoc

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE