Si CodeDeploy affiche encore une erreur, c'est que le script deploy.sh s'exécute sur ton serveur mais rencontre un obstacle local (Payara qui ne répond pas, chemin de fichier, ou droits).

Voici comment diagnostiquer et réparer cela immédiatement.

1. Pourquoi le log est-il encore absent ?
Si cat /home/ubuntu/deploy_script.log ne donne rien, c'est souvent parce que CodeDeploy n'a pas pu créer le fichier à cause des droits sur le dossier /home/ubuntu.

Le test ultime sur ton EC2 :
