Gemini a dit
C'est parfait ! Ton log vient de nous donner la solution finale.

Regarde bien cette ligne dans ton log CodeDeploy :
[stderr]bash: line 1: .../deploy.sh: cannot execute: required file not found
Et l'erreur : exit code 127.

Pourquoi as-tu cette erreur ?
C'est un problème très classique quand on prépare des scripts sous Windows (ou via Eclipse) avant de les envoyer sur Linux. Ton fichier deploy.sh utilise des fins de ligne Windows (CRLF) au lieu de Linux (LF). Linux essaie de lire le script, voit des caractères invisibles à la fin de la première ligne #!/bin/bash\r, et dit : "Je ne trouve pas le programme nommé bash\r". D'où le required file not found.

La Solution : Nettoyer le script dans GitHub Actions
On ne va pas s'embêter à convertir le fichier manuellement. On va demander à ton pipeline GitHub de le faire automatiquement avec une commande sed juste avant de zipper.

1. Ton fichier .github/workflows/deploy.yml (Version Corrigée)
Copie ce bloc. J'ai ajouté la ligne qui transforme le fichier en format Linux pur.

YAML
name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Deployment Package
        run: |
          # 1. On cherche les fichiers
          DEPLOY_SH=$(find . -name "deploy.sh" | head -n 1)
          WAR_FILE=$(find . -name "workflowmicropop.war" | head -n 1)
          APPSPEC=$(find . -name "appspec.yml" | head -n 1)

          # 2. NETTOYAGE CRUCIAL : Convertir CRLF en LF (Format Linux)
          sed -i 's/\r$//' "$DEPLOY_SH"

          # 3. On ramène tout à la racine
          cp "$DEPLOY_SH" ./deploy.sh
          cp "$WAR_FILE" ./workflowmicropop.war
          cp "$APPSPEC" ./appspec.yml
          
          # 4. On force les droits d'exécution
          chmod +x ./deploy.sh

      - name: Create package
        run: |
          zip deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE
2. Ton fichier deploydoc/deploy.sh (Mise à jour)
Utilise cette version qui est plus robuste (elle vérifie le port 4848 avant de lancer Payara).

Bash
#!/bin/bash
# Redirection vers un log simple
exec > >(tee -a /home/ubuntu/deploy_script.log) 2>&1

ASADMIN="/opt/payara/bin/asadmin"
APP_DIR="/home/ubuntu/app"
WAR_FILE="workflowmicropop.war"
PWD_FILE="/tmp/.asadmin_pass"

echo "=== DEBUT DU DEPLOIEMENT : $LIFECYCLE_EVENT ==="
echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE

if [ "$LIFECYCLE_EVENT" == "ApplicationStop" ]; then
    echo "Undeploy de l'ancienne version..."
    $ASADMIN --user admin --passwordfile $PWD_FILE undeploy workflowmicropop || true

elif [ "$LIFECYCLE_EVENT" == "AfterInstall" ]; then
    echo "Attente de Payara..."
    # Attendre que le port 4848 soit ouvert (timeout 60s)
    for i in {1..12}; do
        if nc -z localhost 4848; then
            echo "Payara OK !"
            break
        fi
        echo "Attente..."
        sleep 5
    done

    echo "Déploiement du WAR..."
    $ASADMIN --user admin --passwordfile $PWD_FILE deploy \
      --force \
      --contextroot /workflowmicropop \
      $APP_DIR/$WAR_FILE
fi

rm -f $PWD_FILE
echo "=== FIN DU DEPLOIEMENT ==="
🚀 Pourquoi ça va marcher maintenant ?
La commande sed -i 's/\r$//' "$DEPLOY_SH" dans ton GitHub Actions va supprimer les retours à la ligne Windows invisibles. C'est ce qui causait l'erreur exit code 127 (le "Required file not found").

Fais ton Git Push. Une fois terminé, si tout va bien, le fichier /home/ubuntu/deploy_script.log apparaîtra enfin sur ton EC2 avec le message "SUCCESS" ! On y est !

