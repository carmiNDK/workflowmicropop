name: Build and Deploy JavaEE WAR to EC2

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 23 * * 1'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # ÉTAPE 1 : COMPILATION AVEC FIX ENCODAGE
      - name: Build WAR
        run: |
          cd "workflowprov1.0"
          mkdir -p build/WEB-INF/classes
          mkdir -p dist
          
          # On cherche les sources
          find src -name "*.java" > sources.txt
          
          # On cherche les librairies
          LIBS=$(find . -name "*.jar" | tr '\n' ':')
          
          # COMPILATION : On ajoute -encoding ISO-8859-1 pour gérer les accents
          javac -encoding ISO-8859-1 -d build/WEB-INF/classes -cp "$LIBS" @sources.txt
          
          # Assemblage
          cp -r WebContent/* build/
          cd build && jar -cvf ../dist/workflowmicropop.war .
          echo "Succès : WAR créé avec succès."

      # ÉTAPE 2 : PRÉPARATION DU PACKAGE
      - name: Prepare Package
        run: |
          rm -rf ./out_package deploydoc.zip
          mkdir -p ./out_package
          
          ROOT_DIR="workflowprov1.0"
          cp "$ROOT_DIR/dist/workflowmicropop.war" ./out_package/
          
          # Nettoyage des scripts
          cat "$ROOT_DIR/deploydoc/deploy.sh" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/deploy.sh
          cat "$ROOT_DIR/deploydoc/appspec.yml" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/appspec.yml
          
          chmod +x ./out_package/deploy.sh

      - name: Create Zip
        run: cd ./out_package && zip ../deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      # ÉTAPE 3 : AWS ET DÉPLOIEMENT
      - name: AWS Config & Deploy
        run: |
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_KEY }}
          export AWS_DEFAULT_REGION=eu-west-3
          
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip
          
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE