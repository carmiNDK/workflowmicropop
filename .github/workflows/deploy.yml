Cherche une ligne avec "Script failed" ou "Permission denied".

2. Le Script "Debug Total"
On va modifier ton deploydoc/deploy.sh pour qu'il soit extrêmement bavard et qu'il écrive dans un endroit où il a forcément le droit d'écrire (/tmp).

Remplace le contenu de deploydoc/deploy.sh par ceci :

Bash
#!/bin/bash
# On écrit dans /tmp pour être SÛR que le fichier soit créé
LOG_FILE="/tmp/deploy_debug.log"
exec > >(tee -a $LOG_FILE) 2>&1

echo "--- DEBUT DU DEPLOIEMENT : $LIFECYCLE_EVENT ---"
echo "Utilisateur actuel : $(whoami)"

# Configuration
ASADMIN="/opt/payara/bin/asadmin"
APP_DIR="/home/ubuntu/app"
WAR_FILE="workflowmicropop.war"
PWD_FILE="/tmp/.asadmin_pass"

# Vérification du WAR
if [ ! -f "$APP_DIR/$WAR_FILE" ]; then
    echo "ERREUR : Le fichier $APP_DIR/$WAR_FILE est introuvable !"
    ls -l $APP_DIR
    exit 1
fi

echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE

if [ "$LIFECYCLE_EVENT" == "ApplicationStop" ]; then
    echo "Désinstallation de l'ancienne version..."
    $ASADMIN --user admin --passwordfile $PWD_FILE undeploy workflowmicropop || echo "Rien à désinstaller."

elif [ "$LIFECYCLE_EVENT" == "AfterInstall" ]; then
    echo "Attente de Payara sur le port 4848..."
    # On vérifie si asadmin est accessible
    if [ ! -f "$ASADMIN" ]; then
        echo "ERREUR : asadmin est introuvable dans $ASADMIN"
        exit 1
    fi

    # Attente active
    for i in {1..10}; do
        if nc -z localhost 4848; then
            echo "Payara est en ligne !"
            break
        fi
        echo "Payara dort encore... (5s)"
        sleep 5
    done

    echo "Lancement du deploy..."
    $ASADMIN --user admin --passwordfile $PWD_FILE deploy \
      --force \
      --contextroot /workflowmicropop \
      $APP_DIR/$WAR_FILE
fi

rm -f $PWD_FILE
echo "--- FIN DU SCRIPT ---"
