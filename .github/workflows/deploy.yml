name: Build and Deploy JavaEE WAR to EC2

on:
  workflow_dispatch:
  schedule:
    - cron: '55 22 * * 1'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build WAR
        run: |
          mkdir -p build/WEB-INF/classes
          mkdir -p dist
          find . -name "*.java" > sources.txt
          LIBS=$(find . -name "*.jar" | tr '\n' ':')
          javac -d build/WEB-INF/classes -cp "$LIBS" @sources.txt
          WEB_DIR=$([ -d "WebContent" ] && echo "WebContent" || echo "web")
          cp -r $WEB_DIR/* build/
          cd build && jar -cvf ../dist/workflowmicropop.war .

      - name: Prepare Package
        run: |
          rm -rf ./out_package deploydoc.zip
          mkdir -p ./out_package
          DEPLOY_SH=$(find . -name "deploy.sh" | head -n 1)
          APPSPEC=$(find . -name "appspec.yml" | head -n 1)
          cat "$DEPLOY_SH" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/deploy.sh
          cat "$APPSPEC" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/appspec.yml
          cp dist/workflowmicropop.war ./out_package/workflowmicropop.war
          chmod +x ./out_package/deploy.sh

      - name: Create Zip
        run: cd ./out_package && zip ../deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: AWS Config
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip

      - name: CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE