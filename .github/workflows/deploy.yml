Voici le script User Data corrigé, blindé et prêt pour la production.

J'ai ajouté la gestion du Secure Admin (pour que vous puissiez accéder au port 4848), corrigé la gestion des permissions pour le dossier /app et intégré l'authentification automatique.

Bash
#!/bin/bash
# =================================================================
# User Data - Déploiement Automatique Payara (Version Corrigée)
# =================================================================

# --- Variables ---
REGION="eu-west-3"
S3_BUCKET="micropopdev"
S3_KEY="bundle.zip"
APP_DIR="/home/ubuntu/app"
WAR_FILE="workflowmicropop.war"
PAYARA_PATH="/opt/payara/bin/asadmin"
CONTEXT_ROOT="/workflowmicropop"
LOG_FILE="/home/ubuntu/deploy.log"

# --- Identifiants ---
PAYARA_USER="admin"
PAYARA_PWD="micropop"
PWD_FILE="/tmp/.asadmin_pass"

# --- Initialisation ---
echo "$(date) - Démarrage du script" > $LOG_FILE
mkdir -p $APP_DIR
echo "AS_ADMIN_PASSWORD=$PAYARA_PWD" > $PWD_FILE
chmod 600 $PWD_FILE

# --- Installation des outils AWS ---
apt-get update -y >> $LOG_FILE 2>&1
apt-get install -y unzip awscli >> $LOG_FILE 2>&1

# --- Récupération du fichier depuis S3 ---
echo "$(date) - Téléchargement depuis S3..." | tee -a $LOG_FILE
# On force le téléchargement en tant que root pour éviter les soucis de droits
aws s3 cp s3://$S3_BUCKET/$S3_KEY $APP_DIR/bundle.zip --region $REGION >> $LOG_FILE 2>&1

if [ -f "$APP_DIR/bundle.zip" ]; then
    unzip -o $APP_DIR/bundle.zip -d $APP_DIR >> $LOG_FILE 2>&1
    chown -R ubuntu:ubuntu $APP_DIR
    echo "$(date) - Bundle dézippé avec succès." | tee -a $LOG_FILE
else
    echo "$(date) - ERREUR : Le fichier bundle.zip n'a pas pu être téléchargé." | tee -a $LOG_FILE
    exit 1
fi

# --- Configuration et Déploiement Payara ---
echo "$(date) - Attente du démarrage de Payara..." | tee -a $LOG_FILE

# Boucle d'attente plus robuste
MAX_RETRIES=30
COUNT=0
until $PAYARA_PATH list-domains | grep -q "running"; do
    ((COUNT++))
    if [ $COUNT -ge $MAX_RETRIES ]; then
        echo "$(date) - ERREUR : Payara est trop long à démarrer." | tee -a $LOG_FILE
        exit 1
    fi
    sleep 10
done

echo "$(date) - Payara est prêt. Configuration de l'accès admin..." | tee -a $LOG_FILE

# 1. Activer le secure-admin pour l'accès via port 4848
$PAYARA_PATH --user $PAYARA_USER --passwordfile $PWD_FILE enable-secure-admin >> $LOG_FILE 2>&1

# 2. Redémarrer pour appliquer le secure-admin
$PAYARA_PATH restart-domain >> $LOG_FILE 2>&1
sleep 15

# 3. Déploiement du WAR
if [ -f "$APP_DIR/$WAR_FILE" ]; then
    echo "$(date) - Déploiement de $WAR_FILE..." | tee -a $LOG_FILE
    
    # Suppression si déjà existant
    $PAYARA_PATH --user $PAYARA_USER --passwordfile $PWD_FILE undeploy workflowmicropop >> $LOG_FILE 2>&1
    
    # Déploiement forcé
    $PAYARA_PATH --user $PAYARA_USER --passwordfile $PWD_FILE deploy --force --contextroot $CONTEXT_ROOT $APP_DIR/$WAR_FILE >> $LOG_FILE 2>&1
    
    echo "$(date) - Déploiement terminé avec succès !" | tee -a $LOG_FILE
else
    echo "$(date) - ERREUR : $WAR_FILE est introuvable après extraction." | tee -a $LOG_FILE
fi

# --- Nettoyage ---
rm $PWD_FILE
echo "$(date) - Fin du script User Data." >> $LOG_FILE
Pourquoi cette version va marcher (enfin !) :
enable-secure-admin : C'est la commande magique. Sans elle, Payara refuse les connexions sur le port 4848 provenant de l'extérieur de l'instance. Vos 404 sur l'admin disparaîtront.

Vérification S3 : Le script s'arrête proprement avec un message d'erreur si le téléchargement S3 échoue, ce qui vous permet de voir immédiatement dans le log si c'est un problème de Rôle IAM.

chown -R ubuntu:ubuntu : On s'assure que les fichiers appartiennent à l'utilisateur ubuntu même s'ils ont été téléchargés par le script root.

until ... list-domains : Au lieu d'un simple sleep, le script vérifie réellement si le domaine tourne avant de lancer les commandes d'admin.

Dernier rappel vital :
Assurez-vous que votre Rôle IAM attaché à l'EC2 a bien la permission s3:GetObject sur le bucket micropopdev. C'est souvent la seule chose qui bloque encore après avoir corrigé le script !

