YAML
name: CI/CD Micropop Payara

on:
  push:
    branches: [ main ]  # Se déclenche quand vous pushez sur main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Upload Artifact to S3
        run: |
          # On crée un zip avec le WAR, l'appspec et les scripts
          zip -r bundle.zip target/workflowmicropop.war appspec.yml scripts/
          aws s3 cp bundle.zip s3://micropopdev/bundle.zip

      - name: AWS CodeDeploy Deployment
        run: |
          aws deploy create-deployment \
            --application-name MicropopApp \
            --deployment-group-name MicropopDeploymentGroup \
            --s3-location bucket=micropopdev,key=bundle.zip,bundleType=zip
