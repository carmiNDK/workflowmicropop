name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Deployment Package
        run: |
          # 1. Nettoyage et création du dossier de sortie
          rm -rf ./out_package deploydoc.zip
          mkdir -p ./out_package

          # 2. CIBLAGE STRICT (On ne cherche plus, on pointe du doigt)
          # On définit les chemins exacts vers ton dossier deploydoc
          WAR_FILE_SRC="deploydoc/workflowmicropop.war"
          DEPLOY_SH_SRC="deploydoc/deploy.sh"
          APPSPEC_SRC="deploydoc/appspec.yml"

          echo "DEBUG: Préparation des fichiers depuis le dossier deploydoc..."

          # 3. NETTOYAGE RADICAL (Format Linux + Encodage UTF-8 pur)
          # On traite les fichiers texte pour éviter les erreurs CodeDeploy
          cat "$DEPLOY_SH_SRC" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/deploy.sh
          cat "$APPSPEC_SRC" | tr -d '\r' | iconv -t UTF-8//IGNORE > ./out_package/appspec.yml
          
          # On copie le WAR (le vrai, le nouveau !)
          cp "$WAR_FILE_SRC" ./out_package/workflowmicropop.war

          # 4. Droits d'exécution et vérification
          chmod +x ./out_package/deploy.sh
          
          echo "Vérification du paquet final avant zip :"
          ls -lh ./out_package

      - name: Create package
        run: |
          # On entre dans le dossier propre pour créer un ZIP parfait
          cd ./out_package && zip ../deploydoc.zip appspec.yml deploy.sh workflowmicropop.war

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          # Upload sur S3 (écrase l'ancien zip s'il existe)
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip --region eu-west-3

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name micropop-app \
            --deployment-group-name micropop-dg \
            --s3-location bucket=micropopdev,key=deploydoc.zip,bundleType=zip \
            --region eu-west-3 \
            --file-exists-behavior OVERWRITE