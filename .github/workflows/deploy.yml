# 3. Installation des dépendances (Nécessaire pour unzip et awscli)
apt-get update -y >> $LOG_FILE 2>&1
apt-get install -y unzip awscli >> $LOG_FILE 2>&1

# 4. Téléchargement S3 avec vérification
echo "Tentative de téléchargement S3..." >> $LOG_FILE
aws s3 cp s3://$S3_BUCKET/$S3_KEY $APP_DIR/bundle.zip --region $REGION >> $LOG_FILE 2>&1

if [ ! -f "$APP_DIR/bundle.zip" ]; then
    echo "ERREUR CRITIQUE : Le fichier n'est pas sur le disque !" >> $LOG_FILE
    # Tentative désespérée : on liste le contenu du bucket pour voir si on y a accès
    aws s3 ls s3://$S3_BUCKET/ >> $LOG_FILE 2>&1
else
    echo "Succès : bundle.zip trouvé. Décompression..." >> $LOG_FILE
    unzip -o $APP_DIR/bundle.zip -d $APP_DIR >> $LOG_FILE 2>&1
    chown -R ubuntu:ubuntu $APP_DIR
fi

# 5. Préparation authentification Payara
echo "AS_ADMIN_PASSWORD=micropop" > $PWD_FILE

# 6. Attente que Payara soit UP (On augmente à 60 itérations = 10 minutes max)
echo "Attente de Payara..." >> $LOG_FILE
for i in {1..60}; do
    $PAYARA_PATH list-domains | grep -q "running"
    if [ $? -eq 0 ]; then
        echo "Payara est UP !" >> $LOG_FILE
        break
    fi
    sleep 10
done

# 7. Activation de l'Admin (C'est ce qui bloquait sûrement le déploiement)
echo "Activation Secure Admin..." >> $LOG_FILE
$PAYARA_PATH --user admin --passwordfile $PWD_FILE enable-secure-admin >> $LOG_FILE 2>&1
$PAYARA_PATH restart-domain >> $LOG_FILE 2>&1
sleep 20

# 8. Déploiement final
if [ -f "$APP_DIR/$WAR_FILE" ]; then
    echo "Lancement du déploiement..." >> $LOG_FILE
    $PAYARA_PATH --user admin --passwordfile $PWD_FILE deploy --force --contextroot /workflowmicropop $APP_DIR/$WAR_FILE >> $LOG_FILE 2>&1
    echo "FIN DU SCRIPT : $(date)" >> $LOG_FILE
else
    echo "ERREUR : Le fichier WAR n'existe pas dans $APP_DIR" >> $LOG_FILE
fi

rm $PWD_FILE
