name: Deploy JavaEE WAR to EC2 via CodeDeploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug files
        run: ls -R

      - name: Create package
        run: |
          zip -r deploydoc.zip workflowprov1.0/deploydoc appspec.yml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-3

      - name: Upload S3
        run: |
          aws s3 cp deploydoc.zip s3://micropopdev/deploydoc.zip
